id=\"cp-dates\"><\/div>\n    <div class=\"flex-1 overflow-y-auto\" style=\"max-height:40vh\" id=\"cp-meals\"><\/div>\n  <\/div>\n  <button class=\"w-full mt-3 py-3 rounded-full bg-emerald-500 text-white font-bold\" onclick=\"camPickSave()\">保存<\/button>\n<\/div>\n<script>\nvar CAM_DATE='今天', CAM_MEAL='早餐';\nvar CAM_DATES=['今天','昨天','前天','6月1日','5月31日'];\nfunction fsRailPick(m){ FS_MEAL=m; updateFsMeal(); renderFsSummary(); }\nfunction openCamPicker(){ renderCamPicker(); document.getElementById('campick-backdrop').classList.add('on'); document.getElementById('campick-sheet').classList.add('open'); }\nfunction closeCamPicker(){ document.getElementById('campick-backdrop').classList.remove('on'); document.getElementById('campick-sheet').classList.remove('open'); }\nfunction renderCamPicker(){\n  document.getElementById('cp-dates').innerHTML=CAM_DATES.map(function(d){return '<div class=\"cp-opt'+(d===CAM_DATE?' on':'')+'\" onclick=\"cpSel(\\'date\\',\\''+d+'\\')\">'+d+'<\/div>';}).join('');\n  document.getElementById('cp-meals').innerHTML=FS_MEALS.map(function(m){return '<div class=\"cp-opt'+(m===CAM_MEAL?' on':'')+'\" onclick=\"cpSel(\\'meal\\',\\''+m+'\\')\">'+m+'<\/div>';}).join('');\n}\nfunction cpSel(t,v){ if(t==='date')CAM_DATE=v; else CAM_MEAL=v; renderCamPicker(); }\nfunction camPickSave(){ var el=document.getElementById('camr-target'); if(el)el.textContent=CAM_DATE+' · '+CAM_MEAL; closeCamPicker(); }\n<\/script>\n\n<script>\nvar FS_MEAL='早餐', FS_CUR=null;\nvar MEAL_EMOJI={'早餐':'🌅','早加餐':'🍎','午餐':'☀️','午加餐':'🍵','晚餐':'🌙','晚加餐':'🍮'};\nvar FS_DATA={'早餐':[{emoji:'🍳',name:'煎蛋',qty:'2个',kcal:160},{emoji:'🥛',name:'全脂牛奶',qty:'250ml',kcal:150}]};\nvar FS_MEALS=['早餐','早加餐','午餐','午加餐','晚餐','晚加餐'];\nfunction updateFsMeal(){ var t=document.getElementById('fs-meal'); if(t)t.textContent=FS_MEAL+' ▾'; var b=document.getElementById('fs-meal-b'); if(b)b.textContent=FS_MEAL; renderFsCount(); }\nfunction openMealPick(){ var g=document.getElementById('mp-grid'); g.innerHTML=FS_MEALS.map(function(m){return '<div class=\"mp-chip'+(m===FS_MEAL?' on':'')+'\" onclick=\"pickMeal(\\''+m+'\\')\">'+m+'<\/div>';}).join(''); document.getElementById('mp-backdrop').classList.add('on'); document.getElementById('mp-sheet').classList.add('open'); }\nfunction closeMealPick(){ document.getElementById('mp-backdrop').classList.remove('on'); document.getElementById('mp-sheet').classList.remove('open'); }\nfunction pickMeal(m){ FS_MEAL=m; updateFsMeal(); var cm=document.getElementById('camr-meal'); if(cm)cm.textContent='今天 '+m; closeMealPick(); }\nfunction fsAddFood(){ if(FS_CUR){ if(!FS_DATA[FS_MEAL])FS_DATA[FS_MEAL]=[]; FS_DATA[FS_MEAL].push(FS_CUR); } closeGram(); renderFsCount(); showToast('已添加到'+FS_MEAL); }\nfunction renderFsCount(){ var c=document.getElementById('fs-count'); if(c)c.textContent=(FS_DATA[FS_MEAL]||[]).length; updateHomeMealBadges(); renderDietMeals(); }\nfunction renderDietMeals(){ var box=document.getElementById('diet-meals'); if(!box) return; var html='';\n  FS_MEALS.forEach(function(m){ var list=FS_DATA[m]||[]; if(!list.length) return; var tot=list.reduce(function(a,b){return a+b.kcal;},0);\n    html+='<div><div class=\"flex items-center justify-between mb-2\"><span class=\"text-sm font-bold text-gray-800\">'+(MEAL_EMOJI[m]||'')+' '+m+'<\/span><span class=\"text-[10px] text-gray-400\">'+tot+' 千卡<\/span><\/div><div class=\"space-y-2\">';\n    list.forEach(function(f,i){ html+='<div class=\"flex items-center gap-3 bg-gray-50 rounded-2xl p-3\"><span class=\"text-2xl\">'+f.emoji+'<\/span><div class=\"flex-1\"><p class=\"text-sm font-bold text-gray-800\">'+f.name+'<\/p><p class=\"text-[10px] text-gray-400\">'+f.qty+' · 约'+f.kcal+' kcal<\/p><\/div><button class=\"w-7 h-7 rounded-full bg-red-50 flex items-center justify-center text-red-400\" onclick=\"dietDelFood(\\''+m+'\\','+i+')\">✕<\/button><\/div>'; });\n    html+='<\/div><\/div>'; });\n  box.innerHTML = html || '<p class=\"text-center text-xs text-gray-400 py-6\">今日还没有记录，点底部 + 餐次添加<\/p>'; }\nfunction dietDelFood(m,i){ (FS_DATA[m]||[]).splice(i,1); renderFsCount(); }\nfunction updateHomeMealBadges(){ ['早餐','午餐','晚餐','早加餐'].forEach(function(m){ var el=document.getElementById('hm-'+m); if(!el) return; var n=(FS_DATA[m]||[]).length; el.textContent=n; el.style.display=n?'block':'none'; }); }\nwindow.addEventListener('load',function(){ try{ renderFsCount(); }catch(e){} });\nfunction openFsSummary(){ renderFsSummary(); document.getElementById('fssum-backdrop').classList.add('on'); document.getElementById('fssum-sheet').classList.add('open'); }\nfunction closeFsSummary(){ document.getElementById('fssum-backdrop').classList.remove('on'); document.getElementById('fssum-sheet').classList.remove('open'); }\nfunction renderFsSummary(){ var rail=document.getElementById('fssum-rail'); if(rail){ rail.innerHTML=FS_MEALS.map(function(m){var n=(FS_DATA[m]||[]).length; return '<div class=\"fssum-mi'+(m===FS_MEAL?' on':'')+'\" onclick=\"fsRailPick(\\''+m+'\\')\">'+m+(n?'<span class=\"fssum-badge\">'+n+'<\/span>':'')+'<\/div>';}).join(''); } var list=FS_DATA[FS_MEAL]||[]; var tot=list.reduce(function(a,b){return a+b.kcal;},0); document.getElementById('fssum-head').textContent='共 '+list.length+' 条记录，总计 '+tot+' 千卡'; document.getElementById('fssum-list').innerHTML=list.length?list.map(function(f,i){return '<div class=\"flex items-center gap-3 bg-gray-50 rounded-xl p-3\"><span class=\"text-xl\">'+f.emoji+'<\/span><div class=\"flex-1\"><p class=\"text-sm font-bold text-gray-800\">'+f.name+'<\/p><p class=\"text-[10px] text-gray-400\">'+f.qty+' '+f.kcal+'千卡<\/p><\/div><iconify-icon icon=\"solar:trash-bin-trash-linear\" width=\"18\" class=\"text-gray-400\" onclick=\"fsDel('+i+')\"><\/iconify-icon><\/div>';}).join(''):'<p class=\"text-center text-xs text-gray-400 py-6\">本餐暂无记录，去左侧切换或添加<\/p>'; }\nfunction fsDel(i){ (FS_DATA[FS_MEAL]||[]).splice(i,1); renderFsSummary(); renderFsCount(); }\nfunction fsDone(){ closeFoodSelect(); showToast('已记录到'+FS_MEAL); }\nfunction showCamResult(){ document.getElementById('cam-result').classList.add('open'); }\nfunction closeCamResult(){ document.getElementById('cam-result').classList.remove('open'); }\nfunction camRecord(){ closeCamResult(); closeFoodCamera(); showToast('已记录到 '+CAM_DATE+' '+CAM_MEAL); }\n<\/script>\n\n<script>\nfunction openFoodSelect(meal){ FS_MEAL=meal; updateFsMeal(); document.getElementById('food-select').classList.add('open'); }\nfunction closeFoodSelect(){ document.getElementById('food-select').classList.remove('open'); }\nfunction openGram(name,sub,emoji){ var _k=(sub||'').match(/\\d+/); FS_CUR={name:name,emoji:emoji||'🍽️',kcal:_k?parseInt(_k[0]):86,qty:'1份'}; document.getElementById('gram-name').textContent=name; document.getElementById('gram-sub').textContent=sub; if(emoji) document.getElementById('gram-emoji').textContent=emoji; document.getElementById('gram-backdrop').classList.add('on'); document.getElementById('gram-sheet').classList.add('open'); }\nfunction closeGram(){ document.getElementById('gram-backdrop').classList.remove('on'); document.getElementById('gram-sheet').classList.remove('open'); }\nfunction gramUnit(el){ el.parentElement.querySelectorAll('.gram-unit').forEach(function(u){u.classList.remove('on');}); el.classList.add('on'); }\nfunction openFoodCamera(){ document.getElementById('food-camera').classList.add('open'); }\nfunction closeFoodCamera(){ document.getElementById('food-camera').classList.remove('open'); }\nfunction fsCat(el){ el.parentElement.querySelectorAll('.fs-cat').forEach(function(c){c.classList.remove('on');}); el.classList.add('on'); }\n<\/script>\n\n<!-- ======== 联系营养师 + 健康预警逻辑 ======== -->\n<style>\n.na-backdrop{position:absolute;inset:0;z-index:272;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .3s}\n.na-backdrop.on{opacity:1;pointer-events:auto}\n.na-sheet{position:absolute;bottom:0;left:0;right:0;z-index:273;background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 24px;transform:translateY(100%);transition:transform .3s ease}\n.na-sheet.open{transform:translateY(0)}\n<\/style>\n<div class=\"na-backdrop\" id=\"na-backdrop\" onclick=\"closeNutritionist()\"><\/div>\n<div class=\"na-sheet\" id=\"na-sheet\">\n  <div class=\"flex items-center justify-between mb-3\">\n    <span class=\"text-base font-bold text-gray-900\" id=\"na-pop-title\">加入减重大家庭<\/span>\n    <div class=\"flex items-center gap-2\">\n      <div class=\"inline-flex bg-gray-100 rounded-full p-0.5 text-[10px]\"><span id=\"np-un\" class=\"px-2 py-0.5 rounded-full bg-white font-bold text-gray-700\" style=\"cursor:pointer\" onclick=\"naPopState(false)\">未加入<\/span><span id=\"np-jn\" class=\"px-2 py-0.5 rounded-full text-gray-400\" style=\"cursor:pointer\" onclick=\"naPopState(true)\">已加入<\/span><\/div>\n      <span style=\"font-size:18px;color:#9CA3AF;cursor:pointer\" onclick=\"closeNutritionist()\">✕<\/span>\n    <\/div>\n  <\/div>\n  <div id=\"na-unjoin-content\">\n    <div class=\"rounded-2xl p-3 mb-3 text-white\" style=\"background:linear-gradient(135deg,#10B981,#34D399)\">\n      <p class=\"text-xs font-bold\">检测到健康风险，建议尽快调整方案<\/p>\n      <p class=\"text-[10px] opacity-90 mt-0.5\">加入减重大家庭，由专属营养师 1对1 为你评估与调整方案<\/p>\n    <\/div>\n    <div class=\"flex flex-col items-center text-center\">\n      <div class=\"w-36 h-36 rounded-xl bg-gray-50 border flex items-center justify-center\"><iconify-icon icon=\"solar:qr-code-bold\" width=\"92\" class=\"text-gray-800\"><\/iconify-icon><\/div>\n      <p class=\"text-[10px] text-gray-400 mt-2\">长按识别 / 扫码添加 专属减重顾问企业微信<\/p>\n    <\/div>\n    <button class=\"w-full mt-3 py-3 rounded-xl bg-emerald-500 text-white text-sm font-bold\" onclick=\"showToast('请截图后用微信扫一扫，或长按识别二维码')\">保存二维码<\/button>\n  <\/div>\n  <div id=\"na-join-content\" style=\"display:none\">\n    <div class=\"flex items-center gap-3 bg-gray-50 rounded-2xl p-3 mb-3\">\n      <img class=\"w-12 h-12 rounded-full\" src=\"https://modao.cc/agent-py/media/generated_images/2026-05-19/4e54e55325654ca5925be8615fd38546.jpg\"/>\n      <div class=\"flex-1\"><p class=\"text-sm font-bold text-gray-800\">林悦 · 高级营养师<\/p><p class=\"text-[10px] text-gray-400\">擅长 生酮 / 控糖 / 产后塑形<\/p><\/div>\n      <span class=\"text-[10px] text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full\">在线<\/span>\n    <\/div>\n    <p class=\"text-[11px] text-gray-400 mb-3\">检测到健康风险，可直接联系你的专属营养师调整方案<\/p>\n    <button class=\"w-full py-3 rounded-xl bg-emerald-500 text-white text-sm font-bold\" onclick=\"closeNutritionist();showToast('已进入与营养师的对话')\">💬 发送消息<\/button>\n  <\/div>\n<\/div>\n<script>\nvar HEALTH_ALERTS=[];  // 暂不减重·无方案\nfunction renderAlerts(){\n  var box=document.getElementById('health-alerts'); if(!box) return;\n  if(!HEALTH_ALERTS.length){ box.style.display='none'; return; }\n  box.style.display='block';\n  var cmap={high:{bg:'#FEF2F2',tx:'#B91C1C'},mid:{bg:'#FFFBEB',tx:'#B45309'},low:{bg:'#EFF6FF',tx:'#1D4ED8'}};\n  var html='';\n  HEALTH_ALERTS.forEach(function(a){var c=cmap[a.level]||cmap.low;\n    html+='<div class=\"flex items-start gap-2 rounded-xl p-3\" style=\"background:'+c.bg+'\"><span class=\"text-lg\">'+a.icon+'<\/span><div class=\"flex-1\"><p class=\"text-xs font-bold\" style=\"color:'+c.tx+'\">'+a.title+'<\/p><p class=\"text-[10px] text-gray-500 mt-0.5 leading-relaxed\">'+a.desc+'<\/p><\/div><\/div>';\n  });\n  document.getElementById('alert-items').innerHTML=html;\n  document.getElementById('alert-count').textContent=HEALTH_ALERTS.length+' 项需关注';\n}\nfunction naPopState(joined){ var u=document.getElementById('na-unjoin-content'),j=document.getElementById('na-join-content'); if(u)u.style.display=joined?'none':'block'; if(j)j.style.display=joined?'block':'none'; var t=document.getElementById('na-pop-title'); if(t)t.textContent=joined?'联系营养师':'加入减重大家庭'; var un=document.getElementById('np-un'),jn=document.getElementById('np-jn'); var on='px-2 py-0.5 rounded-full bg-white font-bold text-gray-700',off='px-2 py-0.5 rounded-full text-gray-400'; if(un)un.className=joined?off:on; if(jn)jn.className=joined?on:off; }\nfunction openNutritionist(){ document.getElementById('na-backdrop').classList.add('on'); document.getElementById('na-sheet').classList.add('open'); }\nfunction closeNutritionist(){ document.getElementById('na-backdrop').classList.remove('on'); document.getElementById('na-sheet').classList.remove('open'); }\nrenderAlerts();\n<\/script>\n\n<!-- ======== 消息页（健康提醒/系统消息/通知）======== -->\n<style>\n.hr-page{position:absolute;inset:0;z-index:271;background:#F3F4F6;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}\n.hr-page.open{transform:translateX(0)}\n.hr-tab{flex:1;padding:11px 0;font-size:13px;font-weight:500;color:#9CA3AF;border-bottom:2px solid transparent;background:none;cursor:pointer}\n.hr-tab.on{color:#10B981;font-weight:700;border-bottom-color:#10B981}\n<\/style>\n<div class=\"hr-page\" id=\"health-reminders\">\n  <div class=\"flex items-center px-4 pt-10 pb-3 bg-white\">\n    <span style=\"font-size:22px;cursor:pointer;line-height:1\" onclick=\"closeHealthReminders()\">‹<\/span>\n    <span class=\"flex-1 text-center text-base font-bold text-gray-900\">消息<\/span>\n    <span style=\"width:22px\"><\/span>\n  <\/div>\n  <div class=\"flex bg-white border-b\" id=\"hr-tabs\">\n    <button class=\"hr-tab on\" onclick=\"hrTab(this,'health')\">健康提醒<\/button>\n    <button class=\"hr-tab\" onclick=\"hrTab(this,'system')\">系统消息<\/button>\n    <button class=\"hr-tab\" onclick=\"hrTab(this,'notice')\">通知<\/button>\n  <\/div>\n  <div class=\"flex-1 overflow-y-auto p-4 space-y-3\" id=\"hr-list\"><\/div>\n<\/div>\n<script>\nvar HR_CAT='health';\nvar REMINDERS=[\n  {cat:'health', icon:'⚠️', title:'减重过快提醒', desc:'近7天减重 1.8kg，超过健康速率（≤1kg/周），建议放缓节奏并咨询营养师', time:'今天 09:20', level:'high'},\n  {cat:'health', icon:'🧪', title:'尿酮偏高提醒', desc:'连续 2 天深度入酮，请注意补水；糖尿病人群需谨慎', time:'今天 08:00', level:'mid'},\n  {cat:'health', icon:'📉', title:'体重反弹提醒', desc:'较本阶段最低体重反弹 0.8kg，注意近期饮食与作息', time:'6月1日', level:'mid'},\n  {cat:'system', icon:'📑', title:'系统减重报告已生成', desc:'系统根据近期打卡生成《6月第1周·阶段报告》，可在线查看并下载PDF', time:'今天 09:30', level:'low'},\n  {cat:'system', icon:'🎯', title:'减脂方案已更新', desc:'营养师为您调整了本周饮食方案，请查看', time:'今天 07:30', level:'low'},\n  {cat:'system', icon:'👥', title:'加入减重大家庭', desc:'加入即可获得专属营养师 1对1 评餐与方案指导', time:'昨天 12:40', level:'low'},\n  {cat:'notice', icon:'🔔', title:'坚持打卡', desc:'您已连续打卡 12 天，继续保持～', time:'昨天', level:'low'},\n  {cat:'notice', icon:'📢', title:'功能上新', desc:'AI 拍照记饮食已上线，快来体验', time:'6月2日', level:'low'}\n];\nfunction renderReminders(){\n  var box=document.getElementById('hr-list'); if(!box) return;\n  var list=REMINDERS.filter(function(r){return r.cat===HR_CAT;});\n  if(!list.length){ box.innerHTML='<p class=\"text-center text-[12px] text-gray-400 py-10\">暂无消息<\/p>'; return; }\n  var html='';\n  list.forEach(function(r){\n    var act = r.level==='low' ? '' : 'onclick=\"openNutritionist()\"';\n    var link = r.level==='low' ? '' : '<p class=\"text-[10px] text-emerald-500 font-medium mt-1.5\">加入·获取营养师 →<\/p>';\n    html+='<div class=\"bg-white rounded-2xl p-3.5 card-shadow flex gap-3\" '+act+'><span class=\"text-xl\">'+r.icon+'<\/span><div class=\"flex-1\"><div class=\"flex items-center justify-between\"><p class=\"text-sm font-bold text-gray-800\">'+r.title+'<\/p><span class=\"text-[9px] text-gray-300\">'+r.time+'<\/span><\/div><p class=\"text-[11px] text-gray-500 mt-1 leading-relaxed\">'+r.desc+'<\/p>'+link+'<\/div><\/div>';\n  });\n  box.innerHTML=html;\n}\nfunction hrTab(el,cat){ HR_CAT=cat; document.querySelectorAll('#hr-tabs .hr-tab').forEach(function(t){t.classList.remove('on');}); el.classList.add('on'); renderReminders(); }\nfunction openHealthReminders(){ HR_CAT='health'; document.querySelectorAll('#hr-tabs .hr-tab').forEach(function(t,i){t.classList.toggle('on',i===0);}); renderReminders(); document.getElementById('health-reminders').classList.add('open'); }\nfunction closeHealthReminders(){ document.getElementById('health-reminders').classList.remove('open'); }\nfunction closeAlertCard(){ var b=document.getElementById('health-alerts'); if(b) b.style.display='none'; }\n<\/script>\n\n<!-- ======== 设置减重目标 ======== -->\n<style>\n.gs-backdrop{position:absolute;inset:0;z-index:274;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .3s}\n.gs-backdrop.on{opacity:1;pointer-events:auto}\n.gs-sheet{position:absolute;bottom:0;left:0;right:0;z-index:275;background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 24px;transform:translateY(100%);transition:transform .3s ease}\n.gs-sheet.open{transform:translateY(0)}\n<\/style>\n<div class=\"gs-backdrop\" id=\"gs-backdrop\" onclick=\"closeGoalSet()\"><\/div>\n<div class=\"gs-sheet\" id=\"gs-sheet\">\n  <div class=\"flex items-center justify-between mb-3\"><span class=\"text-base font-bold text-gray-900\">设置减重目标<\/span><span style=\"font-size:18px;color:#9CA3AF;cursor:pointer\" onclick=\"closeGoalSet()\">✕<\/span><\/div>\n  <div class=\"flex justify-between text-xs text-gray-500 mb-2\"><span>当前体重 65.2kg<\/span><span>身高 170cm<\/span><\/div>\n  <div class=\"text-center mb-1\"><span class=\"text-3xl font-bold text-emerald-600\" id=\"gs-target\">60.0<\/span><span class=\"text-sm text-gray-400\"> kg 目标<\/span><\/div>\n  <input type=\"range\" id=\"gs-range\" min=\"50\" max=\"64\" step=\"0.5\" value=\"60\" oninput=\"gsUpdate(this.value)\" style=\"width:100%;accent-color:#10B981\">\n  <div class=\"flex justify-between text-[10px] text-gray-300 px-1\"><span>50<\/span><span>64<\/span><\/div>\n  <div class=\"flex justify-center gap-6 mt-2 text-sm\"><span class=\"text-gray-500\">目标BMI <b class=\"text-gray-800\" id=\"gs-bmi\">20.8<\/b><\/span><span class=\"text-gray-500\">需减 <b class=\"text-emerald-600\" id=\"gs-lose\">5.2<\/b> kg<\/span><\/div>\n  <div class=\"text-[10px] text-amber-600 bg-amber-50 rounded-lg px-3 py-2 mt-3\" id=\"gs-warn\">建议健康减重速率 ≤1kg/周<\/div>\n  <button class=\"w-full mt-4 py-3 rounded-full bg-emerald-500 text-white font-bold\" onclick=\"gsConfirm()\">确定，生成方案<\/button>\n<\/div>\n<script>\nvar GS_CUR=65.2, GS_H=1.70;\nfunction openGoalSet(){ gsUpdate(document.getElementById('gs-range').value); document.getElementById('gs-backdrop').classList.add('on'); document.getElementById('gs-sheet').classList.add('open'); }\nfunction closeGoalSet(){ document.getElementById('gs-backdrop').classList.remove('on'); document.getElementById('gs-sheet').classList.remove('open'); }\nfunction gsUpdate(v){ v=parseFloat(v); document.getElementById('gs-target').textContent=v.toFixed(1); var bmi=v/(GS_H*GS_H); document.getElementById('gs-bmi').textContent=bmi.toFixed(1); var lose=GS_CUR-v; document.getElementById('gs-lose').textContent=lose>0?lose.toFixed(1):'0'; var w=document.getElementById('gs-warn'); if(bmi<18.5){ w.textContent='⚠️ 目标 BMI<18.5 偏瘦，建议调高目标'; } else if(lose<=0){ w.textContent='目标需低于当前体重'; } else { w.textContent='建议健康减重速率 ≤1kg/周，约需 '+Math.ceil(lose)+' 周'; } }\nfunction gsConfirm(){ closeGoalSet(); setTimeout(openHealthInfo,260); }\n<\/script>\n<!-- ======== 完善健康信息 ======== -->\n<style>\n.hi-row{display:flex;align-items:center;justify-content:space-between}\n.hi-sw{width:42px;height:24px;border-radius:999px;background:#E5E7EB;position:relative;cursor:pointer;flex-shrink:0}\n.hi-sw.on{background:#10B981}\n.hi-sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}\n.hi-sw.on::after{left:21px}\n.hi-input{width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:14px;outline:none}\n.hi-chip{display:inline-block;padding:6px 12px;border-radius:999px;background:#F3F4F6;color:#6B7280;font-size:12px;cursor:pointer;border:1.5px solid transparent}\n.hi-chip.sel{background:#ECFDF5;color:#059669;border-color:#10B981}\n.hi-add{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#10B981;font-weight:600;background:#ECFDF5;padding:7px 12px;border-radius:10px;border:none;cursor:pointer;margin-top:6px}\n.hi-drug-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}\n.hi-drug-item .hi-input{flex:1}\n.hi-long{display:flex;align-items:center;gap:4px;flex-shrink:0}\n.hi-sw.sm{width:36px;height:20px}\n.hi-sw.sm::after{width:14px;height:14px;top:3px;left:3px}\n.hi-sw.sm.on::after{left:19px}\n<\/style>\n<div class=\"gs-backdrop\" id=\"hi-backdrop\" onclick=\"closeHealthInfo()\"><\/div>\n<div class=\"gs-sheet\" id=\"hi-sheet\" style=\"max-height:82%;overflow-y:auto\">\n  <div class=\"flex items-center justify-between mb-1\"><span class=\"text-base font-bold text-gray-900\">完善健康信息<\/span><span style=\"font-size:18px;color:#9CA3AF;cursor:pointer\" onclick=\"closeHealthInfo()\">✕<\/span><\/div>\n  <p class=\"text-[11px] text-gray-400 mb-3\">为生成更精准的减重方案，请补充以下信息<\/p>\n  <div class=\"hi-row\"><span class=\"text-sm text-gray-700\">是否服用减重药？<\/span><div class=\"hi-sw\" onclick=\"hiToggle(this,'hi-drug')\"><\/div><\/div>\n  <div id=\"hi-drug\" style=\"display:none;margin-top:8px\"><div id=\"hi-drug-list\"><\/div><button class=\"hi-add\" onclick=\"hiAddDrug()\"><iconify-icon icon=\"solar:add-circle-linear\" width=\"14\"><\/iconify-icon>添加药品<\/button><div style=\"font-size:10px;color:#9CA3AF;margin-top:6px\">* 可添加多个，并标注是否长期用药；平台不提供药物推荐，仅作健康档案记录<\/div><\/div>\n  <div class=\"hi-row\" style=\"margin-top:14px\"><span class=\"text-sm text-gray-700\">是否有相关疾病？<\/span><div class=\"hi-sw\" onclick=\"hiToggle(this,'hi-dis')\"><\/div><\/div>\n  <div id=\"hi-dis\" style=\"display:none;margin-top:8px\"><div class=\"flex gap-2 flex-wrap\"><span class=\"hi-chip\" onclick=\"hiChip(this)\">2型糖尿病<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">高血压<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">血脂异常<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">脂肪肝<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">痛风<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">甲状腺<\/span><\/div><\/div>\n  <div class=\"hi-row\" style=\"margin-top:14px\"><span class=\"text-sm text-gray-700\">是否有特殊生理状态？<\/span><div class=\"hi-sw\" onclick=\"hiToggle(this,'hi-sp')\"><\/div><\/div>\n  <div id=\"hi-sp\" style=\"display:none;margin-top:8px\"><div class=\"flex gap-2 flex-wrap\"><span class=\"hi-chip\" onclick=\"hiChip(this)\">怀孕<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">哺乳期<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">术后恢复<\/span><\/div><\/div>\n  <div class=\"hi-row\" style=\"margin-top:14px\"><span class=\"text-sm text-gray-700\">是否有食物过敏？<\/span><div class=\"hi-sw\" onclick=\"hiToggle(this,'hi-al')\"><\/div><\/div>\n  <div id=\"hi-al\" style=\"display:none;margin-top:8px\"><div class=\"flex gap-2 flex-wrap\"><span class=\"hi-chip\" onclick=\"hiChip(this)\">海鲜<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">花生<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">牛奶<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">鸡蛋<\/span><span class=\"hi-chip\" onclick=\"hiChip(this)\">坚果<\/span><\/div><\/div>\n  <button class=\"w-full mt-5 py-3 rounded-full bg-emerald-500 text-white font-bold\" onclick=\"hiDone()\">完成，生成方案<\/button>\n<\/div>\n<script>\nfunction openHealthInfo(){ document.getElementById('hi-backdrop').classList.add('on'); document.getElementById('hi-sheet').classList.add('open'); }\nfunction closeHealthInfo(){ document.getElementById('hi-backdrop').classList.remove('on'); document.getElementById('hi-sheet').classList.remove('open'); }\nfunction hiToggle(sw,boxId){ sw.classList.toggle('on'); var on=sw.classList.contains('on'); var b=document.getElementById(boxId); if(b) b.style.display=on?'block':'none'; if(boxId==='hi-drug'&&on&&!document.querySelector('#hi-drug-list .hi-drug-item')) hiAddDrug(); }\nfunction hiAddDrug(){ var row=document.createElement('div'); row.className='hi-drug-item'; row.innerHTML='<input class=\"hi-input\" placeholder=\"药品名称\" type=\"text\"><div class=\"hi-long\"><span style=\"font-size:11px;color:#6B7280\">长期<\/span><div class=\"hi-sw sm\" onclick=\"this.classList.toggle(\\'on\\')\"><\/div><\/div><iconify-icon icon=\"solar:trash-bin-minimalistic-linear\" width=\"16\" style=\"color:#D1D5DB;cursor:pointer\" onclick=\"this.closest(\\'.hi-drug-item\\').remove()\"><\/iconify-icon>'; document.getElementById('hi-drug-list').appendChild(row); }\nfunction hiChip(el){ el.classList.toggle('sel'); }\nfunction hiDone(){ closeHealthInfo(); showToast('方案生成中…'); setTimeout(openPlanResult,600); }\n<\/script>\n<!-- ======== 减重方案结果（需确认执行） ======== -->\n<style>\n.pr-page{position:absolute;inset:0;z-index:282;background:#F3F4F6;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}\n.pr-page.open{transform:translateX(0)}\n<\/style>\n<div class=\"pr-page\" id=\"plan-result\">\n  <div class=\"px-5 pt-11 pb-4 text-white\" style=\"background:linear-gradient(135deg,#10B981,#34D399)\">\n    <div class=\"flex items-center justify-between\"><span class=\"text-lg font-bold\">🎉 专属减重方案<\/span><span style=\"font-size:20px;cursor:pointer;opacity:.85\" onclick=\"closePlanResult()\">✕<\/span><\/div>\n    <p class=\"text-[11px] opacity-90 mt-1\">已根据你的身体与健康数据生成，确认后即可开始执行<\/p>\n  <\/div>\n  <div class=\"flex-1 overflow-y-auto p-4 space-y-4\" style=\"padding-bottom:90px\">\n    <div class=\"bg-white rounded-2xl p-4\">\n      <p class=\"text-sm font-bold text-gray-800 mb-3\">方案概览<\/p>\n      <div class=\"grid grid-cols-2 gap-3\">\n        <div class=\"bg-gray-50 rounded-xl p-3\"><p class=\"text-[10px] text-gray-400\">目标体重<\/p><p class=\"text-lg font-bold\">60 <span class=\"text-xs\">kg<\/span><\/p><\/div>\n        <div class=\"bg-gray-50 rounded-xl p-3\"><p class=\"text-[10px] text-gray-400\">建议周期<\/p><p class=\"text-lg font-bold\">8 <span class=\"text-xs\">周<\/span><\/p><\/div>\n        <div class=\"bg-gray-50 rounded-xl p-3\"><p class=\"text-[10px] text-gray-400\">每日热量目标<\/p><p class=\"text-lg font-bold\">1,500 <span class=\"text-xs\">kcal<\/span><\/p><\/div>\n        <div class=\"bg-gray-50 rounded-xl p-3\"><p class=\"text-[10px] text-gray-400\">每日热量缺口<\/p><p class=\"text-lg font-bold\">350 <span class=\"text-xs\">kcal<\/span><\/p><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"bg-white rounded-2xl p-4\">\n      <div class=\"flex items-center justify-between mb-3\"><span class=\"text-sm font-bold text-gray-800\">🍽️ 每日饮食方案<\/span><span class=\"text-base font-bold text-emerald-600\">1500 <span class=\"text-[11px] text-gray-400 font-medium\">kcal<\/span><\/span><\/div>\n      <div class=\"grid grid-cols-3 gap-3\">\n        <div><div class=\"flex justify-between text-[10px] mb-1\"><span class=\"text-gray-500\">蛋白质<\/span><span class=\"text-gray-400\">90g·24%<\/span><\/div><div class=\"h-1.5 bg-gray-100 rounded-full\"><div class=\"h-full rounded-full\" style=\"width:24%;background:#10B981\"><\/div><\/div><\/div>\n        <div><div class=\"flex justify-between text-[10px] mb-1\"><span class=\"text-gray-500\">碳水<\/span><span class=\"text-gray-400\">169g·45%<\/span><\/div><div class=\"h-1.5 bg-gray-100 rounded-full\"><div class=\"h-full rounded-full\" style=\"width:45%;background:#F59E0B\"><\/div><\/div><\/div>\n        <div><div class=\"flex justify-between text-[10px] mb-1\"><span class=\"text-gray-500\">脂肪<\/span><span class=\"text-gray-400\">52g·31%<\/span><\/div><div class=\"h-1.5 bg-gray-100 rounded-full\"><div class=\"h-full rounded-full\" style=\"width:31%;background:#EF4444\"><\/div><\/div><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"bg-white rounded-2xl p-4\">\n      <p class=\"text-sm font-bold text-gray-800 mb-3\">🏃 每日运动方案<\/p>\n      <div class=\"flex gap-3 text-center\">\n        <div class=\"flex-1 bg-gray-50 rounded-xl p-2.5\"><p class=\"text-base font-bold\">300<\/p><p class=\"text-[10px] text-gray-400\">消耗(kcal)<\/p><\/div>\n        <div class=\"flex-1 bg-gray-50 rounded-xl p-2.5\"><p class=\"text-base font-bold\">40<\/p><p class=\"text-[10px] text-gray-400\">时长(分钟)<\/p><\/div>\n        <div class=\"flex-1 bg-gray-50 rounded-xl p-2.5\"><p class=\"text-base font-bold\">中等<\/p><p class=\"text-[10px] text-gray-400\">强度<\/p><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"flex gap-3\">\n      <div class=\"flex-1 bg-white rounded-2xl p-4\"><p class=\"text-sm font-bold text-gray-800 mb-1\">😴 睡眠方案<\/p><p class=\"text-base font-bold text-indigo-500\">7-8 <span class=\"text-[11px] text-gray-400\">小时<\/span><\/p><p class=\"text-[10px] text-gray-400 mt-1\">23:30 前入睡<\/p><\/div>\n      <div class=\"flex-1 bg-white rounded-2xl p-4\"><p class=\"text-sm font-bold text-gray-800 mb-1\">💧 饮水方案<\/p><p class=\"text-base font-bold text-cyan-500\">1800 <span class=\"text-[11px] text-gray-400\">ml<\/span><\/p><p class=\"text-[10px] text-gray-400 mt-1\">约8杯·少量多次<\/p><\/div>\n    <\/div>\n    <div class=\"text-[10px] text-gray-400 bg-gray-50 rounded-xl px-3 py-2\">确认后方案将应用到首页打卡与目标进度，营养师可在后台动态调整<\/div>\n  <\/div>\n  <div class=\"absolute bottom-0 left-0 right-0 bg-white border-t p-3 flex gap-3\" style=\"z-index:1\">\n    <button class=\"flex-1 py-3 rounded-full bg-gray-100 text-gray-600 font-bold text-sm\" onclick=\"closePlanResult()\">稍后再说<\/button>\n    <button class=\"flex-[2] py-3 rounded-full bg-emerald-500 text-white font-bold text-sm\" onclick=\"planConfirm()\">确认，按此方案执行<\/button>\n  <\/div>\n<\/div>\n<script>\nfunction openPlanResult(){ document.getElementById('plan-result').classList.add('open'); }\nfunction closePlanResult(){ document.getElementById('plan-result').classList.remove('open'); }\nfunction planConfirm(){ closePlanResult(); showToast('已开始按方案执行，可在营养师页随时查看'); }\n<\/script>\n\n<!-- ======== 打卡录入弹窗 ======== -->\n<style>\n.rec-backdrop{position:absolute;inset:0;z-index:263;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .3s}\n.rec-backdrop.on{opacity:1;pointer-events:auto}\n.rec-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 20px 24px;z-index:264;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.1);max-height:82%;overflow-y:auto}\n.rec-sheet.open{transform:translateY(0)}\n.rec-chip{display:inline-block;padding:7px 14px;border-radius:999px;background:#F3F4F6;color:#6B7280;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent}\n.rec-chip.sel{background:#ECFDF5;color:#059669;border-color:#10B981}\n.rec-label{font-size:12px;font-weight:700;color:#374151;margin:14px 0 8px;display:block}\n.rec-input{width:100%;padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:14px;outline:none}\n.rec-input:focus{border-color:#10B981}\n.rec-row{display:flex;gap:10px}\n.rec-2{flex:1}\n.rec-save{width:100%;margin-top:18px;padding:13px;background:#10B981;color:#fff;border-radius:14px;font-size:14px;font-weight:700}\n.rec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}\n.rec-title{font-size:16px;font-weight:800;color:#111827}\n.rec-close{font-size:18px;color:#9CA3AF;cursor:pointer}\n.ketone-cell{flex:1;height:40px;border-radius:8px;cursor:pointer;border:2px solid transparent}\n.ketone-cell.sel{border-color:#111827}\n.muted-note{font-size:10px;color:#9CA3AF;margin-top:8px;background:#F9FAFB;border-radius:8px;padding:8px 10px}\n.cal-cell{flex:0 0 auto;width:46px;padding:7px 0;border-radius:12px;background:#F3F4F6;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:background .15s}\n.cal-cell.cal-sel{background:#10B981}\n.cal-wk{font-size:10px;color:#9CA3AF}\n.cal-cell.cal-sel .cal-wk{color:#D1FAE5}\n.cal-day{font-size:15px;font-weight:700;color:#374151;line-height:1}\n.cal-cell.cal-sel .cal-day{color:#fff}\n.cal-dot{width:5px;height:5px;border-radius:50%;background:transparent}\n.cal-dot.done{background:#10B981}\n.cal-dot.miss{background:#FCA5A5}\n.cal-cell.cal-sel .cal-dot.done,.cal-cell.cal-sel .cal-dot.miss{background:#fff}\n.dk-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap}\n.dk-todo{background:#E5E7EB;color:#6B7280}\n.dk-doing{background:#FEF3C7;color:#B45309}\n.dk-done{background:#D1FAE5;color:#059669}\n.dk-miss{background:#FEE2E2;color:#DC2626}\n<\/style>\n<div class=\"rec-backdrop\" id=\"rec-backdrop\" onclick=\"closeRecord()\"><\/div>\n\n<div class=\"rec-sheet\" id=\"rec-weight\">\n  <div class=\"rec-head\"><span class=\"rec-title\">⚖️ 体重<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n  <div class=\"flex gap-2 mt-2\">\n    <button class=\"rec-chip sel\" onclick=\"selectBodyMethod(this,'manual')\">手动输入<\/button>\n    <button class=\"rec-chip\" onclick=\"selectBodyMethod(this,'ble')\">蓝牙体脂秤<\/button>\n    <button class=\"rec-chip\" onclick=\"selectBodyMethod(this,'photo')\">拍照<\/button>\n  <\/div>\n  <div id=\"ble-measure\" style=\"display:none;margin-top:12px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:14px;padding:14px\">\n    <div class=\"flex items-center justify-between\">\n      <div><div style=\"font-size:22px;font-weight:800;color:#065F46\">82.60 <span style=\"font-size:12px;font-weight:500\">kg<\/span><\/div><div style=\"font-size:10px;color:#6B7280;margin-top:2px\">来源：蓝牙体脂秤 · 正在测量…<\/div><\/div>\n      <iconify-icon icon=\"solar:bluetooth-wave-bold\" width=\"26\" class=\"text-emerald-500\"><\/iconify-icon>\n    <\/div>\n    <div style=\"font-size:11px;color:#B45309;background:#FEF3C7;border-radius:10px;padding:8px 10px;margin-top:10px\">⚠️ 与上次相差较大，是否本人测量？<\/div>\n    <div class=\"flex gap-2 mt-2\">\n      <button class=\"rec-chip sel\" style=\"flex:1;text-align:center\" onclick=\"showToast('已确认本次体重')\">是我的<\/button>\n      <button class=\"rec-chip\" style=\"flex:1;text-align:center\" onclick=\"showToast('已标记为无效')\">无效<\/button>\n    <\/div>\n  <\/div>\n  <span class=\"rec-label\">体重<\/span>\n  <div class=\"rec-row\">\n    <input class=\"rec-input rec-2\" type=\"number\" placeholder=\"如 65.0\">\n    <div class=\"flex\" style=\"gap:6px\">\n      <button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">kg<\/button>\n      <button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">lb<\/button>\n    <\/div>\n  <\/div>\n  <div class=\"rec-row\" style=\"margin-top:10px\">\n    <div class=\"rec-2\"><span class=\"rec-label\" style=\"margin-top:0\">体脂率 %<\/span><input class=\"rec-input\" type=\"number\" placeholder=\"如 24.5\"><\/div>\n    <div class=\"rec-2\"><span class=\"rec-label\" style=\"margin-top:0\">BMI（自动）<\/span><input class=\"rec-input\" value=\"22.5\" readonly style=\"background:#F9FAFB;color:#6B7280\"><\/div>\n  <\/div>\n  <button class=\"rec-save\" onclick=\"closeRecord();showToast('体重已保存')\">保存<\/button>\n<\/div>\n\n<div class=\"rec-sheet\" id=\"rec-measure\">\n  <div class=\"rec-head\"><span class=\"rec-title\">📏 三围<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n  <span class=\"rec-label\">三围（cm）<\/span>\n  <div class=\"rec-row\">\n    <input class=\"rec-input rec-2\" type=\"number\" placeholder=\"腰围 *必填\">\n    <input class=\"rec-input rec-2\" type=\"number\" placeholder=\"臀围\">\n    <input class=\"rec-input rec-2\" type=\"number\" placeholder=\"腹围\">\n  <\/div>\n  <div class=\"muted-note\">腰臀比将根据 腰围/臀围 自动计算，展示在「数据」页<\/div>\n  <button class=\"rec-save\" onclick=\"closeRecord();showToast('三围已保存')\">保存<\/button>\n<\/div>\n\n<div class=\"rec-sheet\" id=\"rec-ketone\">\n  <div class=\"rec-head\"><span class=\"rec-title\">🧪 尿酮<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n  <span class=\"rec-label\">拍摄 / 上传试纸照片<\/span>\n  <div id=\"ketone-shot\" class=\"rounded-2xl border-2 border-dashed p-5 flex flex-col items-center text-center\" style=\"border-color:#E5E7EB\" onclick=\"ketonePhoto()\">\n    <iconify-icon icon=\"solar:camera-add-bold\" width=\"28\" class=\"text-purple-400\"><\/iconify-icon>\n    <span class=\"text-[11px] text-gray-500 mt-1.5\" id=\"ketone-shot-tip\">拍摄或上传试纸照片，AI 自动识别入酮状态<\/span>\n    <span class=\"text-[10px] text-gray-400 mt-0.5\">兼容各品牌试纸，无需对照色卡<\/span>\n  <\/div>\n  <div id=\"ketone-result\" style=\"display:none\">\n    <span class=\"rec-label\">AI 识别结果<\/span>\n    <div class=\"rounded-2xl p-3\" style=\"background:#F5F3FF\">\n      <div class=\"flex items-center justify-between\"><span class=\"text-base font-bold text-purple-700\" id=\"ketone-ai-text\">已入酮<\/span><span class=\"text-[10px] text-purple-500 bg-white px-2 py-0.5 rounded-full\">置信度 <span id=\"ketone-conf\">92%<\/span><\/span><\/div>\n      <p class=\"text-[10px] text-gray-500 mt-1\" id=\"ketone-ai-desc\">已进入轻度生酮，继续保持，注意补水<\/p>\n    <\/div>\n    <span class=\"rec-label\">识别有误？手动校正<\/span>\n    <div class=\"flex gap-2\"><button class=\"rec-chip\" onclick=\"ketoneFix(this,'未入酮')\">未入酮<\/button><button class=\"rec-chip sel\" onclick=\"ketoneFix(this,'已入酮')\">已入酮<\/button><button class=\"rec-chip\" onclick=\"ketoneFix(this,'深度入酮')\">深度入酮<\/button><\/div>\n  <\/div>\n  <div class=\"muted-note\">不同品牌试纸色阶不同，以 AI 识别 / 校正后的入酮状态为准<\/div>\n  <button class=\"rec-save\" onclick=\"closeRecord();showToast('尿酮已保存')\">保存<\/button>\n<\/div>\n\n<div class=\"rec-sheet\" id=\"rec-bowel\">\n  <div class=\"rec-head\"><span class=\"rec-title\">🚽 排便记录<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n<style>\n.fv-sw{width:42px;height:24px;border-radius:999px;background:#E5E7EB;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}\n.fv-sw.on{background:#10B981}\n.fv-sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}\n.fv-sw.on::after{left:21px}\n<\/style>\n  <div class=\"flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2.5\" style=\"margin-top:6px\">\n    <span class=\"text-xs text-gray-700 flex items-center gap-1\">是否在服用果蔬粉<iconify-icon icon=\"solar:info-circle-linear\" width=\"14\" class=\"text-gray-400\" style=\"cursor:pointer\" onclick=\"toggleFvInfo()\"><\/iconify-icon><\/span>\n    <div class=\"fv-sw\" id=\"fv-sw\" onclick=\"fvToggle(this)\"><\/div>\n  <\/div>\n  <div id=\"fv-info\" class=\"text-[10px] text-gray-500 leading-relaxed bg-amber-50 rounded-xl px-3 py-2 mt-2\" style=\"display:none\">果蔬植物粉里有丰富的消化酶和有机酸，起到分解肠道内容物、调节肠道环境的作用。服用果蔬粉会有咕噜、排便、排气的现象，属于正常现象，上完厕所后会感觉到轻松、舒服。在服用几次后症状会缓解，直至正常没特殊感觉，那就说明肠道通畅、环境改善了。<\/div>\n  <div class=\"muted-note\" id=\"bowel-count\">今日已记录 0 次，每排一次点下方记录一次<\/div>\n  <div id=\"bowel-list\"><\/div>\n  <span class=\"rec-label\">本次时间（默认当前，可修改）<\/span>\n  <input class=\"rec-input\" type=\"time\" id=\"bowel-time\">\n  <span class=\"rec-label\">形状（布里斯托分型）<\/span>\n  <div class=\"flex gap-2 flex-wrap\" id=\"bowel-shape\"><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">硬球<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">块状<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">裂纹<\/button><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">光滑(理想)<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">软块<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">糊状<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">水样<\/button><\/div>\n  <span class=\"rec-label\">颜色<\/span>\n  <div class=\"flex gap-2 flex-wrap\" id=\"bowel-color\"><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">棕色<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">黄色<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">绿色<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">黑色<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">红色<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">灰白<\/button><\/div>\n  <span class=\"rec-label\">异常情况<\/span>\n  <div class=\"flex gap-2 flex-wrap\" id=\"bowel-abnormal\"><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">无<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">带血<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">黏液<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">未消化物<\/button><\/div>\n  <div class=\"muted-note\">黑色 / 红色 / 持续异常建议及时就医<\/div>\n  <div class=\"flex gap-2\">\n    <button class=\"rec-save\" style=\"flex:2;margin-top:0\" onclick=\"bowelAdd()\">＋ 记录本次排便<\/button>\n    <button class=\"rec-save\" style=\"flex:1;margin-top:0;background:#F3F4F6;color:#6B7280\" onclick=\"closeRecord()\">完成<\/button>\n  <\/div>\n<\/div>\n\n<div class=\"rec-sheet\" id=\"rec-sleep\">\n  <div class=\"rec-head\"><span class=\"rec-title\">😴 睡眠与作息<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n  <div class=\"rec-row\" style=\"margin-top:6px\">\n    <div class=\"rec-2\"><span class=\"rec-label\" style=\"margin-top:0\">入睡时间 <span style=\"color:#9CA3AF;font-weight:400\">· 昨天<\/span><\/span><input class=\"rec-input\" type=\"time\" value=\"23:30\"><\/div>\n    <div class=\"rec-2\"><span class=\"rec-label\" style=\"margin-top:0\">起床时间 <span style=\"color:#9CA3AF;font-weight:400\">· 今天<\/span><\/span><input class=\"rec-input\" type=\"time\" value=\"07:00\"><\/div>\n  <\/div>\n  <div class=\"muted-note\">睡眠时长：约 7h 30min（自动计算）<\/div>\n  <span class=\"rec-label\">睡眠质量<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">很差<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">一般<\/button><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">良好<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">很好<\/button><\/div>\n  <span class=\"rec-label\">熬夜频率<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">几乎不<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">偶尔<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">经常<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">每天<\/button><\/div>\n  <span class=\"rec-label\">压力水平<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">低<\/button><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">中<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">高<\/button><\/div>\n  <span class=\"rec-label\">情绪状态<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">😀 开心<\/button><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">😐 一般<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">😟 低落<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">😣 焦虑<\/button><\/div>\n  <div class=\"muted-note\">深度睡眠 / REM 等设备数据为二期（小程序难直接获取）<\/div>\n  <button class=\"rec-save\" onclick=\"closeRecord();showToast('睡眠与作息已保存')\">保存<\/button>\n<\/div>\n\n<div class=\"rec-sheet\" id=\"rec-exercise\">\n  <div class=\"rec-head\"><span class=\"rec-title\">🏃 运动记录<\/span><span class=\"rec-close\" onclick=\"closeRecord()\">✕<\/span><\/div>\n  <span class=\"rec-label\">运动类型<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"rec-chip sel\" onclick=\"toggleChip(this,true)\">跑步<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">骑行<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">健身<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">步行<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">游泳<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">HIIT<\/button><button class=\"rec-chip\" onclick=\"toggleChip(this,true)\">瑜伽<\/button><\/div>\n  <span class=\"rec-label\">时长（分钟）<\/span>\n  <input class=\"rec-input\" type=\"number\" value=\"30\">\n  <div class=\"muted-note\">预计消耗：约 280 kcal（按 类型 / 时长 / 体重 自动带出）<\/div>\n  <button class=\"rec-save\" onclick=\"closeRecord();showToast('运动记录已保存')\">保存<\/button>\n<\/div>\n\n<script>\n    function openRecord(type){\n        document.getElementById('rec-backdrop').classList.add('on');\n        var s=document.getElementById('rec-'+type); if(s) s.classList.add('open'); if(type==='bowel'&&typeof bowelInit==='function') bowelInit();\n    }\n    function closeRecord(){\n        document.getElementById('rec-backdrop').classList.remove('on');\n        document.querySelectorAll('.rec-sheet').forEach(function(s){s.classList.remove('open');});\n    }\n    function toggleChip(el, single){\n        if(single){ el.parentElement.querySelectorAll('.rec-chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); }\n        else { el.classList.toggle('sel'); }\n    }\n    function selectBodyMethod(el, m){\n        el.parentElement.querySelectorAll('.rec-chip').forEach(function(c){c.classList.remove('sel');});\n        el.classList.add('sel');\n        var b=document.getElementById('ble-measure'); if(b) b.style.display=(m==='ble')?'block':'none';\n    }\n    function bowelInit(){ var d=new Date(); var t=document.getElementById('bowel-time'); if(t&&!t.value) t.value=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); try{ var sw=document.getElementById('fv-sw'); if(sw) sw.classList.toggle('on', localStorage.getItem('fvPowder')==='1'); }catch(e){} }\n    function fvToggle(el){ el.classList.toggle('on'); try{ localStorage.setItem('fvPowder', el.classList.contains('on')?'1':'0'); }catch(e){} }\n    function toggleFvInfo(){ var b=document.getElementById('fv-info'); if(b) b.style.display=(b.style.display==='none'||!b.style.display)?'block':'none'; }\n    function bSel(id){ var el=document.querySelector('#'+id+' .rec-chip.sel'); return el?el.textContent:'-'; }\n    function bowelAdd(){ var t=(document.getElementById('bowel-time')||{}).value||'--:--'; window.BOWEL_LOG=window.BOWEL_LOG||[]; window.BOWEL_LOG.push({t:t,s:bSel('bowel-shape'),c:bSel('bowel-color'),a:bSel('bowel-abnormal')}); renderBowel(); showToast('已记录本次排便 · '+t); var ti=document.getElementById('bowel-time'); if(ti) ti.value=''; bowelInit(); }\n    function bowelDel(i){ window.BOWEL_LOG.splice(i,1); renderBowel(); }\n    function renderBowel(){ window.BOWEL_LOG=window.BOWEL_LOG||[]; var c=document.getElementById('bowel-count'); if(c) c.textContent='今日已记录 '+window.BOWEL_LOG.length+' 次，每排一次点下方记录一次'; var l=document.getElementById('bowel-list'); if(l) l.innerHTML=window.BOWEL_LOG.map(function(b,i){ return '<div class=\"flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2 mb-2\"><div class=\"text-xs text-gray-700\"><span class=\"font-bold\">'+b.t+'<\/span> · '+b.s+' · '+b.c+(b.a&&b.a!=='无'?' · <span class=\"text-red-500\">'+b.a+'<\/span>':'')+'<\/div><span class=\"text-gray-300\" style=\"cursor:pointer\" onclick=\"bowelDel('+i+')\">✕<\/span><\/div>'; }).join(''); }\n    function ketonePhoto(){ showToast('AI 识别中…'); setTimeout(function(){ var t=document.getElementById('ketone-shot-tip'); if(t) t.textContent='✓ 已上传试纸照片，点击可重拍'; var r=document.getElementById('ketone-result'); if(r) r.style.display='block'; }, 600); }\nfunction ketoneFix(el,t){ el.parentElement.querySelectorAll('.rec-chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); var d=(t==='未入酮')?'尚未进入生酮，可适当控制碳水摄入':((t==='已入酮')?'已进入轻度生酮，继续保持，注意补水':'深度入酮，注意补水，必要时咨询营养师'); var a=document.getElementById('ketone-ai-text'); if(a) a.textContent=t; var dd=document.getElementById('ketone-ai-desc'); if(dd) dd.textContent=d; }\n    function selectKetone(el, lvl){\n        document.querySelectorAll('#ketone-scale .ketone-cell').forEach(function(c){c.classList.remove('sel');});\n        el.classList.add('sel');\n        var t = lvl===0 ? '未入酮' : (lvl<=2 ? '已入酮' : '深度入酮（注意补水，必要时咨询营养师）');\n        document.getElementById('ketone-status').textContent='生酮状态：'+t;\n    }\n    function buildCalStrip(){\n        var wrap=document.getElementById('cal-strip'); if(!wrap) return;\n        var wk=['日','一','二','三','四','五','六'];\n        var today=new Date(); today.setHours(0,0,0,0);\n        var html='';\n        for(var i=13;i>=0;i--){\n            var d=new Date(today); d.setDate(today.getDate()-i);\n            var isToday=(i===0);\n            var done=!isToday && (i%3!==0);\n            var label=(d.getMonth()+1)+'月'+d.getDate()+'日';\n            var dotCls=isToday?'':(done?' done':' miss');\n            html+='<div class=\"cal-cell'+(isToday?' cal-sel':'')+'\" onclick=\"selectCalDay(this,\\''+label+'\\','+isToday+','+i+')\">'\n                +'<span class=\"cal-wk\">'+(isToday?'今天':wk[d.getDay()])+'<\/span>'\n                +'<span class=\"cal-day\">'+d.getDate()+'<\/span>'\n                +'<span class=\"cal-dot'+dotCls+'\"><\/span>'\n                +'<\/div>';\n        }\n        wrap.innerHTML=html;\n        var sw=document.getElementById('cal-strip-wrap'); if(sw) sw.scrollLeft=sw.scrollWidth;\n    }\n    function selectCalDay(el,label,isToday,i){\n        document.querySelectorAll('#cal-strip .cal-cell').forEach(function(c){c.classList.remove('cal-sel');});\n        el.classList.add('cal-sel');\n        var tip=document.getElementById('cal-tip');\n        if(tip){\n            if(isToday){ tip.style.display='none'; }\n            else { tip.style.display='flex'; tip.innerHTML='✏️ 正在为 <b style=\"margin:0 2px\">'+label+'<\/b> 补卡，下方记录将保存到该日期'; }\n        }\n        updateDayCards(i, isToday);\n    }\n    function dkBadge(key, cls, text){\n        var e=document.getElementById('st-'+key); if(!e) return;\n        e.className='dk-badge '+cls; e.textContent=text;\n    }\n    function updateDayCards(i, isToday){\n        var keys=['diet','weight','measure','ketone','bowel','sleep','exercise'];\n        if(isToday){\n            dkBadge('diet','dk-doing','进行中');\n            dkBadge('weight','dk-todo','去完成');\n            dkBadge('measure','dk-todo','去完成');\n            dkBadge('ketone','dk-todo','去完成');\n            dkBadge('bowel','dk-todo','去完成');\n            dkBadge('sleep','dk-done','✓ 已打卡');\n            dkBadge('exercise','dk-doing','进行中');\n            return;\n        }\n        var seed=i*7;\n        var st=[ (seed%2===0), (i%3!==0), ((seed+1)%3!==0), (seed%5!==0), (i%4!==0), ((seed+2)%3!==0), (i%2===0) ];\n        keys.forEach(function(k,idx){\n            if(st[idx]) dkBadge(k,'dk-done','✓ 已打卡');\n            else dkBadge(k,'dk-miss','去补卡');\n        });\n    }\n    buildCalStrip();\n    updateDayCards(0, true);\n    (function(){\n        var dl=document.getElementById('wt-days-left'), de=document.getElementById('wt-eta');\n        if(!dl||!de) return;\n        var days=parseInt(dl.textContent,10)||42;\n        var t=new Date(); t.setHours(0,0,0,0); t.setDate(t.getDate()+days);\n        de.textContent=(t.getMonth()+1)+'月'+t.getDate()+'日';\n    })();\n<\/script>\n\n<script>\n    // ========== Page Navigation ==========\n    function switchPage(pageId) {\n        var target = document.getElementById(pageId);\n        if (!target) { if(typeof showToast==='function') showToast('该入口需在完整 App 内跳转'); return; }\n        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));\n        target.classList.add('active');\n        document.querySelectorAll('.nav-item').forEach(function(item) {\n            var icon = item.querySelector('iconify-icon');\n            var iconName = icon.getAttribute('icon');\n            if (item.getAttribute('data-page') === pageId) {\n                item.classList.add('tab-active');\n                item.classList.remove('text-gray-400');\n                icon.setAttribute('icon', iconName.replace('linear', 'bold'));\n            } else {\n                item.classList.remove('tab-active');\n                item.classList.add('text-gray-400');\n                icon.setAttribute('icon', iconName.replace('bold', 'linear'));\n            }\n        });\n        if (pageId === 'page-tracking') setTimeout(initCharts, 100);\n    }\n\n    function switchSubTab(tabId) {\n        document.querySelectorAll('.sub-tab').forEach(function(t) {\n            t.classList.remove('border-emerald-500','text-emerald-500','font-bold');\n            t.classList.add('border-transparent','text-gray-400','font-medium');\n        });\n        var at = document.querySelector('.sub-tab[data-tab=\"' + tabId + '\"]');\n        at.classList.add('border-emerald-500','text-emerald-500','font-bold');\n        at.classList.remove('border-transparent','text-gray-400','font-medium');\n        document.querySelectorAll('.sub-page').forEach(function(p) { p.classList.add('hidden'); });\n        var sp = document.getElementById('sub-page-' + tabId);\n        if (sp) sp.classList.remove('hidden');\n        setTimeout(initCharts, 50);\n    }\n\n    function switchRecordTab(tabId) {\n        document.querySelectorAll('.record-tab').forEach(function(t) {\n            t.classList.remove('border-emerald-500','text-emerald-500','font-bold');\n            t.classList.add('border-transparent','text-gray-400','font-medium');\n        });\n        var rt = document.querySelector('.record-tab[data-tab=\"' + tabId + '\"]');\n        rt.classList.add('border-emerald-500','text-emerald-500','font-bold');\n        document.querySelectorAll('[id^=\"record-content-\"]').forEach(function(el) { el.classList.add('hidden'); });\n        var tgt = document.getElementById('record-content-' + tabId);\n        if (tgt) tgt.classList.remove('hidden');\n    }\n\n    // ========== Food Selector ==========\n    var currentFoodName='', currentCalPer100g=0, selectedGrams=100;\n    function showFoodSelector(name, calPer100g) {\n        currentFoodName = name; currentCalPer100g = calPer100g; selectedGrams = 100;\n        document.getElementById('selector-food-name').textContent = name;\n        document.getElementById('selector-total-cal').textContent = Math.round(calPer100g);\n        document.getElementById('selector-cal-detail').textContent = calPer100g + ' kcal × 100g';\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        var fp = document.querySelector('.preset-btn[data-grams=\"100\"]');\n        if (fp) { fp.classList.add('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200'); fp.classList.remove('bg-gray-50','text-gray-600','font-medium','border-gray-100'); }\n        document.getElementById('custom-grams').value = '';\n        document.getElementById('food-selector-overlay').classList.remove('hidden');\n    }\n    function hideFoodSelector() { document.getElementById('food-selector-overlay').classList.add('hidden'); }\n    function selectPreset(btn, grams) {\n        selectedGrams = grams;\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        btn.classList.add('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n        btn.classList.remove('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        document.getElementById('selector-total-cal').textContent = Math.round(currentCalPer100g * grams / 100);\n        document.getElementById('selector-cal-detail').textContent = currentCalPer100g + ' kcal × ' + grams + 'g';\n        document.getElementById('custom-grams').value = '';\n    }\n    function applyCustomGrams() {\n        var v = parseInt(document.getElementById('custom-grams').value);\n        if (!v || v <= 0) return;\n        selectedGrams = v;\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        document.getElementById('selector-total-cal').textContent = Math.round(currentCalPer100g * v / 100);\n        document.getElementById('selector-cal-detail').textContent = currentCalPer100g + ' kcal × ' + v + 'g';\n    }\n    function confirmFoodAdd() { hideFoodSelector(); showToast('已添加到今日饮食记录'); }\n\n    // ========== Body Entry ==========\n    function switchBodyMetric(metric) {\n        document.querySelectorAll('.body-metric-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-500','text-white');\n            b.classList.add('bg-gray-100','text-gray-500');\n        });\n        document.querySelector('.body-metric-btn[data-metric=\"' + metric + '\"]').classList.add('bg-emerald-500','text-white');\n        document.querySelectorAll('.body-metric-content').forEach(function(c) { c.classList.add('hidden'); });\n        var t = document.getElementById('body-metric-' + metric);\n        if (t) t.classList.remove('hidden');\n    }\n    function showBodyEntry() { document.getElementById('body-entry-overlay').classList.remove('hidden'); }\n    function hideBodyEntry() { document.getElementById('body-entry-overlay').classList.add('hidden'); }\n    function toggleBodyUnit(btn, unit) {\n        var row = btn.closest('.body-unit-row');\n        row.querySelectorAll('.unit-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-500','text-white','border-emerald-200');\n            b.classList.add('bg-gray-100','text-gray-500','border-gray-100');\n        });\n        btn.classList.add('bg-emerald-500','text-white','border-emerald-200');\n        btn.classList.remove('bg-gray-100','text-gray-500','border-gray-100');\n    }\n    function saveBodyRecord() { hideBodyEntry(); showToast('记录成功！'); }\n\n    // ========== Toast ==========\n    function showToast(msg) {\n        var t = document.createElement('div');\n        t.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[200] bg-gray-900 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-lg';\n        t.textContent = msg;\n        document.body.appendChild(t);\n        setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 300ms'; setTimeout(function() { t.remove(); }, 300); }, 1500);\n    }\n\n    // ========== Charts ==========\n    var dietChart, bodyChart;\n    function initCharts() {\n        var dd = document.getElementById('diet-chart');\n        if (dd) {\n            if (dietChart) dietChart.dispose();\n            dietChart = echarts.init(dd);\n            dietChart.setOption({\n                tooltip: { trigger: 'item' },\n                series: [{\n                    name: '热量分配', type: 'pie', radius: ['60%', '85%'],\n                    avoidLabelOverlap: false, label: { show: false },\n                    data: [\n                        { value: 342, name: '早餐', itemStyle: { color: '#FDBA74' } },\n                        { value: 580, name: '午餐', itemStyle: { color: '#60A5FA' } },\n                        { value: 323, name: '晚餐', itemStyle: { color: '#A78BFA' } },\n                        { value: 282, name: '剩余', itemStyle: { color: '#F3F4F6' } }\n                    ]\n                }]\n            });\n        }\n        var bd = document.getElementById('body-chart');\n        if (bd) {\n            if (bodyChart) bodyChart.dispose();\n            bodyChart = echarts.init(bd);\n            bodyChart.setOption({\n                grid: { left: '10%', right: '5%', top: '10%', bottom: '20%' },\n                xAxis: { type: 'category', data: ['05-13','05-14','05-15','05-16','05-17','05-18','05-19'], axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 10, color: '#9CA3AF' } },\n                yAxis: { type: 'value', min: 64, splitLine: { lineStyle: { type: 'dashed', color: '#F3F4F6' } }, axisLabel: { fontSize: 10, color: '#9CA3AF' } },\n                series: [{ data: [68.5,67.8,67.2,66.5,66.0,65.5,65.2], type: 'line', smooth: true, symbol: 'circle', symbolSize: 6, itemStyle: { color: '#10B981' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{ offset: 0, color: 'rgba(16,185,129,0.2)' },{ offset: 1, color: 'rgba(16,185,129,0)' }]) } }]\n            });\n        }\n    }\n\n    // ========== ONBOARDING ==========\n    var onbCurStep = 1;\n    var ONB_TOTAL = 4;\n    var onbGender = '';\n    var customDiseases = [];\n    var customAllergies = [];\n    var customPhysios = [];\n    var needWeightLoss = true;\n\n    function selectGender(el, gender) {\n        document.querySelectorAll('.gender-card').forEach(function(c) { c.classList.remove('sel'); });\n        el.classList.add('sel');\n        onbGender = gender;\n    }\n\n    function updateRuler(id, val) {\n        var el = document.getElementById(id);\n        if (!el) return;\n        if (id === 'onb-weight' || id === 'onb-target-wt')\n            el.textContent = parseFloat(val).toFixed(1);\n        else\n            el.textContent = parseInt(val);\n    }\n\n    function fineRuler(inpId, dispId, delta) {\n        var inp = document.getElementById(inpId);\n        var isW = (dispId === 'onb-weight' || dispId === 'onb-target-wt');\n        var step = isW ? 0.5 : 1;\n        var v = parseFloat(inp.value) + delta;\n        v = Math.round(v / step) * step;\n        v = Math.max(parseFloat(inp.min), Math.min(parseFloat(inp.max), v));\n        inp.value = v;\n        var dispVal = isW ? v.toFixed(1) : parseInt(v);\n        document.getElementById(dispId).textContent = dispVal;\n        if (dispId === 'onb-weight') { updateBMI(); updatePlanCalc(); }\n        if (dispId === 'onb-target-wt') { updateTargetBMI(); updatePlanCalc(); }\n    }\n\n    function updateBMI() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var w = parseFloat(document.getElementById('onb-weight-inp').value);\n        if (!h || !w) return;\n        var bmi = w / (h * h);\n        var bmiR = bmi.toFixed(1);\n        document.getElementById('onb-bmi').textContent = bmiR;\n        var label = '正常', left = 50;\n        if (bmi < 18.5) { label = '偏瘦'; left = 12; }\n        else if (bmi < 24) { label = '正常'; left = 38; }\n        else if (bmi < 28) { label = '超重'; left = 68; }\n        else { label = '肥胖'; left = 88; }\n        document.getElementById('onb-bmi-label').textContent = label;\n        var p2 = document.getElementById('bmi-pos2');\n        if (p2) p2.style.left = left + '%';\n        updatePlanCalc();\n    }\n\n    function updateTargetBMI() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var tw = parseFloat(document.getElementById('onb-target-inp').value);\n        if (!h || !tw) return;\n        var bmi = tw / (h * h);\n        var bmiR = bmi.toFixed(1);\n        document.getElementById('target-bmi').textContent = bmiR;\n        var label = '正常', left = 50;\n        if (bmi < 18.5) { label = '偏瘦'; left = 12; document.getElementById('target-bmi-warn').style.display = 'block'; }\n        else if (bmi < 24) { label = '正常'; left = 38; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        else if (bmi < 28) { label = '超重'; left = 68; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        else { label = '肥胖'; left = 88; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        document.getElementById('target-bmi-label').textContent = label;\n        var pos = document.getElementById('target-bmi-pos');\n        if (pos) pos.style.left = left + '%';\n    }\n\n    function setupTargetSlider() {\n        var cw = parseFloat(document.getElementById('onb-weight-inp').value);\n        var inp = document.getElementById('onb-target-inp');\n        inp.max = cw - 0.1;\n        if (parseFloat(inp.value) >= cw) inp.value = cw - 0.5;\n        inp.min = 35;\n        updateRuler('onb-target-wt', inp.value);\n        updateTargetBMI();\n        updatePlanCalc();\n        var ticks = document.getElementById('target-ticks');\n        if (ticks) {\n            var r = Math.floor(cw - 0.1);\n            ticks.innerHTML = '<span>35<\/span><span>' + Math.round(35 + (r - 35) / 3) + '<\/span><span>' + Math.round(35 + 2 * (r - 35) / 3) + '<\/span><span>' + r + '<\/span>';\n        }\n    }\n\n    function updatePlanCalc() {\n        var cw = parseFloat(document.getElementById('onb-weight-inp').value);\n        var tw = parseFloat(document.getElementById('onb-target-inp').value);\n        var h = parseFloat(document.getElementById('onb-height-inp').value);\n        if (!cw || !tw || !h) return;\n        var diff = cw - tw;\n        var ws = diff > 0 ? Math.max(4, Math.round(Math.abs(diff) / 0.5)) : 0;\n        var wkly = ws > 0 ? (diff / ws) : 0;\n\n        // 身高、体重\n        var ph = document.getElementById('plan-height');\n        if (ph) ph.textContent = h;\n        var pwEl = document.getElementById('plan-weight');\n        if (pwEl) pwEl.textContent = cw;\n\n        // BMI分类和进度条\n        var bmi = cw / ((h / 100) * (h / 100));\n        var bmiR = bmi.toFixed(1);\n        var bmiEl = document.getElementById('plan-bmi');\n        if (bmiEl) bmiEl.textContent = bmiR;\n\n        var catEl = document.getElementById('plan-bmi-cat');\n        var dotEl = document.getElementById('plan-bmi-dot');\n        var catName, leftPct, dotColor;\n        if (bmi < 18.5) { catName = '偏瘦'; leftPct = 8; dotColor = '#F59E0B'; }\n        else if (bmi < 24) { catName = '理想'; leftPct = 38; dotColor = '#10B981'; }\n        else if (bmi < 28) { catName = '偏胖'; leftPct = 65; dotColor = '#F59E0B'; }\n        else { catName = '肥胖'; leftPct = 92; dotColor = '#EF4444'; }\n        if (catEl) catEl.textContent = catName;\n        if (dotEl) { dotEl.style.left = leftPct + '%'; dotEl.style.borderColor = dotColor; }\n\n        // 目标体重、周期\n        var pt = document.getElementById('plan-target');\n        if (pt) pt.innerHTML = tw + '<span style=\"font-size:14px\">kg<\/span>';\n        var pw = document.getElementById('plan-weeks');\n        if (pw) pw.innerHTML = ws + '<span style=\"font-size:14px\">周<\/span>';\n        var pwk = document.getElementById('plan-weekly');\n        if (pwk) pwk.innerHTML = Math.abs(wkly).toFixed(1) + '<span style=\"font-size:14px\">kg/周<\/span>';\n\n        // 热量\n        var cd = diff > 0 ? Math.min(Math.round(Math.abs(wkly) * 700), 800) : 0;\n        var ct = Math.max(1200, 2000 - cd);\n        var ce = document.getElementById('plan-cal');\n        if (ce) ce.textContent = ct;\n        var de = document.getElementById('plan-deficit');\n        if (de) de.textContent = cd;\n\n        // 饮食建议\n        var dietEl = document.getElementById('plan-diet-tip');\n        if (dietEl) {\n            if (bmi >= 28) {\n                dietEl.textContent = '建议严格控制总热量摄入，减少高油高糖食物，增加蔬菜比例，优先选择低GI主食，每日蛋白质摄入不低于60g。';\n            } else if (bmi >= 24) {\n                dietEl.textContent = '建议控制精制碳水摄入，增加优质蛋白（鸡胸肉、鱼虾、豆制品）和膳食纤维（蔬菜、全谷物），每日热量控制在目标范围内。';\n            } else if (bmi >= 18.5) {\n                dietEl.textContent = '建议保持均衡饮食，适当增加优质蛋白摄入，控制精制糖和油炸食品，多吃蔬果和全谷物。';\n            } else {\n                dietEl.textContent = '建议适当增加营养摄入，保证每日三餐规律，优先选择高蛋白食物（蛋、奶、瘦肉），可适当加餐补充能量。';\n            }\n        }\n\n        // 运动建议\n        var exEl = document.getElementById('plan-exercise-tip');\n        if (exEl) {\n            if (bmi >= 28) {\n                exEl.textContent = '建议从低强度运动开始（如快走、游泳、骑行），每周 4-5 次，每次 30-40 分钟，避免跳绳、跑步等高冲击运动保护关节。';\n            } else if (bmi >= 24) {\n                exEl.textContent = '建议每周进行 3-5 次中等强度有氧运动（慢跑、游泳、动感单车等）结合 2-3 次力量训练，每次 40-50 分钟效果更佳。';\n            } else if (bmi >= 18.5) {\n                exEl.textContent = '建议每周 3-4 次有氧运动（慢跑、快走、游泳等）结合 2 次力量训练，保持运动多样性，每次 30-45 分钟。';\n            } else {\n                exEl.textContent = '建议以力量训练为主（自重训练、瑜伽、普拉提等）帮助增肌，配合适量有氧运动（慢跑、快走），每周 3-4 次。';\n            }\n        }\n    }\n\n    function refreshBmiAssessment() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var w = parseFloat(document.getElementById('onb-weight-inp').value);\n        var bmi = w / (h * h);\n        var bmiR = bmi.toFixed(1);\n        var lowW = (18.5 * h * h).toFixed(1);\n        var highW = (24 * h * h).toFixed(1);\n        document.getElementById('bmi-result-num').textContent = bmiR;\n        document.getElementById('bmi-range-low').textContent = lowW;\n        document.getElementById('bmi-range-high').textContent = highW;\n        var badge = document.getElementById('bmi-result-badge');\n        var title = document.getElementById('bmi-result-title');\n        var sub = document.getElementById('bmi-result-sub');\n        var normalBox = document.getElementById('bmi-normal-box');\n        var suggestion = document.getElementById('bmi-suggestion-text');\n        var choiceBtns = document.getElementById('bmi-choice-btns');\n        if (bmi >= 24) {\n            badge.textContent = bmi >= 28 ? '肥胖' : '超重';\n            badge.style.background = '#FEF2F2'; badge.style.color = '#DC2626';\n            title.textContent = 'BMI 偏高';\n            sub.textContent = '您的体重超出健康范围，建议设定减重目标';\n            normalBox.style.display = 'none';\n            suggestion.textContent = '';\n            choiceBtns.style.display = 'none';\n            needWeightLoss = true;\n        } else if (bmi >= 18.5) {\n            badge.textContent = '正常';\n            badge.style.background = '#ECFDF5'; badge.style.color = '#059669';\n            title.textContent = 'BMI 正常';\n            sub.textContent = '您的体重处于健康范围';\n            normalBox.style.display = 'block';\n            suggestion.textContent = '您是否有减重需求？';\n            choiceBtns.style.display = 'flex';\n            needWeightLoss = false;\n        } else {\n            badge.textContent = '偏瘦';\n            badge.style.background = '#FEF3C7'; badge.style.color = '#D97706';\n            title.textContent = 'BMI 偏瘦';\n            sub.textContent = '您的体重偏低，建议适当增加营养';\n            normalBox.style.display = 'none';\n            suggestion.textContent = '';\n            choiceBtns.style.display = 'none';\n            needWeightLoss = false;\n        }\n    }\n\n    function acceptWeightLoss() {\n        needWeightLoss = true;\n        document.getElementById('onb-prev-btn').style.display = '';\n        document.getElementById('onb-next-btn').style.display = '';\n        showOnbStep(6);\n    }\n\n    function declineWeightLoss() {\n        needWeightLoss = false;\n        finishOnboarding();\n    }\n\n    // ========== Date Scrollers ==========\n    var dateYear, dateMonth, dateDay;\n    function initDateScrollers() {\n        var curY = 1998, curM = 6, curD = 15;\n        dateYear = curY; dateMonth = curM; dateDay = curD;\n\n        function buildCol(colEl, start, end, selected) {\n            var inner = colEl.querySelector('.scroller-col-inner');\n            inner.innerHTML = '';\n            for (var i = start; i <= end; i++) {\n                var div = document.createElement('div');\n                div.className = 'scroller-it';\n                div.textContent = i;\n                if (i === selected) div.classList.add('hi');\n                div.addEventListener('click', function() {\n                    colEl.querySelectorAll('.scroller-it').forEach(function(d) { d.classList.remove('hi'); });\n                    this.classList.add('hi');\n                    this.scrollIntoView({ block: 'center', behavior: 'smooth' });\n                    updateAge();\n                });\n                inner.appendChild(div);\n            }\n            requestAnimationFrame(function() {\n                var sel = inner.querySelector('.scroller-it.hi');\n                if (sel) sel.scrollIntoView({ block: 'center' });\n            });\n        }\n\n        buildCol(document.getElementById('sc-year'), 1940, 2010, curY);\n        buildCol(document.getElementById('sc-month'), 1, 12, curM);\n        buildCol(document.getElementById('sc-day'), 1, 31, curD);\n\n        document.querySelectorAll('.scroller-col').forEach(function(col) {\n            col.addEventListener('scroll', function() {\n                var items = col.querySelectorAll('.scroller-it');\n                var colRect = col.getBoundingClientRect();\n                var centerY = colRect.top + colRect.height / 2;\n                var closest = null, minDist = Infinity;\n                items.forEach(function(it) {\n                    var r = it.getBoundingClientRect();\n                    var dist = Math.abs(r.top + r.height / 2 - centerY);\n                    if (dist < minDist) { minDist = dist; closest = it; }\n                });\n                if (closest) {\n                    var changed = false;\n                    items.forEach(function(it) {\n                        if (it === closest && !it.classList.contains('hi')) { it.classList.add('hi'); changed = true; }\n                        else if (it !== closest && it.classList.contains('hi')) { it.classList.remove('hi'); }\n                    });\n                    if (changed) updateAge();\n                }\n            });\n        });\n    }\n\n    function getSelectedDate() {\n        var yEl = document.querySelector('#sc-year .scroller-it.hi');\n        var mEl = document.querySelector('#sc-month .scroller-it.hi');\n        var dEl = document.querySelector('#sc-day .scroller-it.hi');\n        if (!yEl || !mEl || !dEl) return null;\n        return { year: parseInt(yEl.textContent), month: parseInt(mEl.textContent), day: parseInt(dEl.textContent) };\n    }\n\n    function updateAge() {\n        var d = getSelectedDate();\n        if (!d) return;\n        var now = new Date();\n        var age = now.getFullYear() - d.year;\n        if (now.getMonth() + 1 < d.month || (now.getMonth() + 1 === d.month && now.getDate() < d.day)) age--;\n        document.getElementById('onb-age').textContent = age;\n    }\n\n    // ========== Step Navigation ==========\n    function showOnbStep(n) {\n        document.querySelectorAll('#onb-body .onb-step').forEach(function(s) {\n            s.classList.remove('active');\n            if (parseInt(s.dataset.step) < n) s.style.transform = 'translateX(-50px)';\n            else if (parseInt(s.dataset.step) > n) s.style.transform = 'translateX(50px)';\n        });\n        var cur = document.querySelector('#onb-body .onb-step[data-step=\"' + n + '\"]');\n        if (cur) { cur.classList.add('active'); cur.style.transform = 'translateX(0)'; }\n        onbCurStep = n;\n\n        document.querySelectorAll('#step-dots .step-dot').forEach(function(d, i) {\n            d.classList.remove('current', 'done');\n            if (i + 1 === n) d.classList.add('current');\n            else if (i + 1 < n) d.classList.add('done');\n        });\n\n        var prevBtn = document.getElementById('onb-prev-btn');\n        var nextBtn = document.getElementById('onb-next-btn');\n        prevBtn.classList.toggle('invisible', n === 1);\n        if (n === ONB_TOTAL) {\n            nextBtn.textContent = '查看报告';\n            nextBtn.classList.add('mint-gradient');\n        } else {\n            nextBtn.textContent = '下一步';\n            nextBtn.classList.remove('mint-gradient');\n        }\n\n        // Step-specific init\n        if (n === 1) setTimeout(initDateScrollers, 100);\n        if (n === 2) { updateBMI(); }\n        if (n === 4) updatePlanCalc();\n    }\n\n    function nextOnbStep() {\n        if (onbCurStep === 1 && !onbGender) { showToast('请选择性别'); return; }\n        if (onbCurStep < ONB_TOTAL) showOnbStep(onbCurStep + 1);\n        else finishOnboarding();\n    }\n\n    function prevOnbStep() {\n        if (onbCurStep > 1) showOnbStep(onbCurStep - 1);\n    }\n\n    // ========== Toggle Switches ==========\n    var physioCustom = [];\n    function toggleSwitch(type) {\n        var tog = document.getElementById('toggle-' + type);\n        var exp = document.getElementById('expand-' + type);\n        var isOff = tog.classList.contains('off');\n        if (isOff) {\n            tog.classList.remove('off');\n            tog.classList.add('on');\n            exp.style.maxHeight = exp.scrollHeight + 'px';\n            exp.style.opacity = '1';\n            exp.style.marginTop = '12px';\n        } else {\n            tog.classList.remove('on');\n            tog.classList.add('off');\n            exp.style.maxHeight = '0px';\n            exp.style.opacity = '0';\n            exp.style.marginTop = '0px';\n        }\n    }\n\n    function selectSolo(el, group) {\n        document.querySelectorAll('#' + group + '-tags .tag-item').forEach(function(t) {\n            if (t.style.borderStyle !== 'dashed') t.classList.remove('sel');\n        });\n        el.classList.add('sel');\n    }\n\n    function reEditProfile() {\n        showOnbStep(1);\n        showToast('💡 请重新调整数据，方案将实时更新');\n    }\n\n    function finishOnboarding() {\n        document.getElementById('onboarding').classList.add('hidden');\n        switchPage('page-home');\n        updateBMI();\n        updatePlanCalc();\n        showToast('方案已生成，开始您的健康之旅吧！');\n    }\n\n    // ========== Disease & Allergy Sheets ==========\n    function openDiseaseSheet() {\n        document.getElementById('disease-backdrop').classList.add('on');\n        document.getElementById('disease-sheet').classList.add('open');\n        document.getElementById('disease-sheet-input').value = '';\n        document.getElementById('disease-sheet-input').placeholder = '请输入疾病名称';\n        renderDiseaseChips();\n    }\n\n    function closeDiseaseSheet() {\n        document.getElementById('disease-backdrop').classList.remove('on');\n        document.getElementById('disease-sheet').classList.remove('open');\n    }\n\n    function confirmCustomDisease() {\n        var inp = document.getElementById('disease-sheet-input');\n        var name = inp.value.trim();\n        if (!name) { showToast('请输入名称'); return; }\n        if (inp.placeholder.indexOf('过敏') >= 0) {\n            if (customAllergies.indexOf(name) >= 0) { showToast('该过敏食物已添加'); return; }\n            customAllergies.push(name);\n            inp.value = '';\n            renderAllergyChips();\n        } else {\n            if (customDiseases.indexOf(name) >= 0) { showToast('该疾病已添加'); return; }\n            customDiseases.push(name);\n            inp.value = '';\n            renderDiseaseChips();\n            renderStep6DiseaseChips();\n        }\n    }\n\n    function renderDiseaseChips() {\n        var sc = document.getElementById('custom-disease-chips-sheet');\n        if (sc) sc.innerHTML = customDiseases.map(function(d, i) {\n            return '<span class=\"custom-disease-chip\">' + d + '<span class=\"remove-chip\" onclick=\"removeCustomDisease(' + i + ')\">x<\/span><\/span>';\n        }).join('');\n    }\n\n    function renderStep6DiseaseChips() {\n        var dp = document.getElementById('custom-disease-chips-display');\n        if (dp) dp.innerHTML = customDiseases.map(function(d, i) {\n            return '<span class=\"custom-disease-chip\">' + d + '<span class=\"remove-chip\" onclick=\"removeCustomDisease(' + i + ')\">x<\/span><\/span>';\n        }).join('');\n    }\n\n    function removeCustomDisease(idx) {\n        customDiseases.splice(idx, 1);\n        renderDiseaseChips();\n        renderStep6DiseaseChips();\n    }\n\n    function toggleDrugSwitch(track) {\n        track.classList.toggle('on');\n        var box = document.getElementById('drug-input-box');\n        if (box) box.classList.toggle('show', track.classList.contains('on'));\n    }\n\n    function toggleAllergySwitch(track) {\n        track.classList.toggle('on');\n        document.getElementById('allergy-box').style.display = track.classList.contains('on') ? 'block' : 'none';\n    }\n\n    function openAllergySheet() {\n        document.getElementById('disease-backdrop').classList.add('on');\n        document.getElementById('disease-sheet').classList.add('open');\n        document.getElementById('disease-sheet-input').value = '';\n        document.getElementById('disease-sheet-input').placeholder = '请输入过敏食物名称';\n        renderAllergyChips();\n    }\n\n    function renderAllergyChips() {\n        var sc = document.getElementByI
