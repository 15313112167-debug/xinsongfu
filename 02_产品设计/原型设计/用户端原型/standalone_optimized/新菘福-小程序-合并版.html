  <\/div>\n    <div class=\"flex items-center justify-between p-4 btn-click-effect\">\n      <div class=\"flex items-center gap-3\"><iconify-icon class=\"text-gray-400\" icon=\"solar:settings-linear\" width=\"20\"><\/iconify-icon><span class=\"text-sm\">系统设置<\/span><\/div>\n      <iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon>\n    <\/div>\n  <\/div>\n\n  <button class=\"w-full py-4 text-center text-red-500 text-sm font-medium bg-white rounded-2xl card-shadow btn-click-effect\" onclick=\"confirmLogout()\">退出登录<\/button>\n<\/div>\n<\/div>\n<\/div>\n<div class=\"absolute bottom-0 w-full h-20 bg-white border-t flex items-center justify-around px-2 z-50\">\n<button class=\"nav-item flex flex-col items-center gap-1 text-gray-400\" data-page=\"page-home\" onclick=\"if(document.getElementById('page-home')){switchPage('page-home')}\">\n<iconify-icon icon=\"solar:home-2-bold\" width=\"24\"><\/iconify-icon>\n<span class=\"text-[10px] font-medium\">首页<\/span>\n<\/button>\n<button class=\"nav-item flex flex-col items-center gap-1 text-gray-400\" data-page=\"page-tracking\" onclick=\"switchPage('page-tracking')\">\n<iconify-icon icon=\"solar:chart-2-linear\" width=\"24\"><\/iconify-icon>\n<span class=\"text-[10px] font-medium\">数据<\/span>\n<\/button>\n<div class=\"relative -mt-10\">\n<button class=\"w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center text-white fab-button btn-click-effect\" onclick=\"switchPage('page-diet-record')\">\n<iconify-icon icon=\"solar:add-circle-bold\" width=\"32\"><\/iconify-icon>\n<\/button>\n<\/div>\n<button class=\"nav-item flex flex-col items-center gap-1 text-gray-400\" data-page=\"page-messages\" onclick=\"switchPage('page-messages')\">\n<iconify-icon icon=\"solar:user-heart-rounded-linear\" width=\"24\"><\/iconify-icon>\n<span class=\"text-[10px] font-medium\">营养师<\/span>\n<\/button>\n<button class=\"nav-item flex flex-col items-center gap-1 tab-active\" data-page=\"page-profile\" onclick=\"switchPage('page-profile')\">\n<iconify-icon icon=\"solar:user-linear\" width=\"24\"><\/iconify-icon>\n<span class=\"text-[10px] font-medium\">我的<\/span>\n<\/button>\n<\/div>\n\n<!-- ======== 二级弹窗：健康档案 / 智能设备 ======== -->\n<style>\n.ps-backdrop{position:absolute;inset:0;z-index:249;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .3s}\n.ps-backdrop.on{opacity:1;pointer-events:auto}\n.ps-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 20px 24px;z-index:250;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.1);max-height:86%;overflow-y:auto}\n.ps-sheet.open{transform:translateY(0)}\n.ps-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}\n.ps-title{font-size:16px;font-weight:800;color:#111827}\n.ps-close{font-size:18px;color:#9CA3AF;cursor:pointer}\n.ps-label{font-size:12px;font-weight:700;color:#374151;margin:14px 0 8px;display:block}\n.ps-input{width:100%;padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:14px;outline:none}\n.ps-input:focus{border-color:#10B981}\n.ps-chip{display:inline-block;padding:7px 14px;border-radius:999px;background:#F3F4F6;color:#6B7280;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent}\n.ps-chip.sel{background:#ECFDF5;color:#059669;border-color:#10B981}\n.ps-save{width:100%;margin-top:18px;padding:13px;background:#10B981;color:#fff;border-radius:14px;font-size:14px;font-weight:700}\n.ps-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F3F4F6;font-size:13px}\n.ps-row span:first-child{color:#6B7280}\n.ps-row span:last-child{color:#111827;font-weight:600}\n.ps-note{font-size:10px;color:#9CA3AF;margin-top:10px;background:#F9FAFB;border-radius:8px;padding:8px 10px}\n.ps-2{flex:1}\n<\/style>\n<div class=\"ps-backdrop\" id=\"ps-backdrop\" onclick=\"closeSheet()\"><\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-archive\">\n  <div class=\"ps-head\"><span class=\"ps-title\">健康档案<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <div style=\"margin-top:6px\">\n    <div class=\"flex items-center justify-between py-3.5 border-b\" onclick=\"openSheet('basic')\"><span class=\"text-sm text-gray-700\">基础数据<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n    <div class=\"flex items-center justify-between py-3.5 border-b\" onclick=\"openSheet('healthdata')\"><span class=\"text-sm text-gray-700\">健康数据<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n    <div class=\"flex items-center justify-between py-3.5 border-b\" onclick=\"openSheet('history')\"><span class=\"text-sm text-gray-700\">健康史<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n    <div class=\"flex items-center justify-between py-3.5 border-b\" onclick=\"openSheet('special')\"><span class=\"text-sm text-gray-700\">特殊生理状态<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n    <div class=\"flex items-center justify-between py-3.5 border-b\" onclick=\"openSheet('period')\"><span class=\"text-sm text-gray-700\">生理期<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n    <div class=\"flex items-center justify-between py-3.5\" onclick=\"openSheet('diet')\"><span class=\"text-sm text-gray-700\">饮食偏好<\/span><iconify-icon class=\"text-gray-300\" icon=\"solar:alt-arrow-right-linear\"><\/iconify-icon><\/div>\n  <\/div>\n<\/div>\n<div class=\"ps-sheet\" id=\"sheet-basic\">\n  <div class=\"ps-head\"><span class=\"ps-title\">基础数据<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <span class=\"ps-label\">性别<\/span>\n  <div class=\"flex gap-2\"><button class=\"ps-chip sel\" onclick=\"toggleChip(this,true)\">男<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this,true)\">女<\/button><\/div>\n  <span class=\"ps-label\">出生日期<\/span><input class=\"ps-input\" type=\"date\" value=\"1995-06-01\">\n  <div class=\"flex gap-3\" style=\"margin-top:10px\"><div class=\"ps-2\"><span class=\"ps-label\" style=\"margin-top:0\">身高(cm)<\/span><input class=\"ps-input\" type=\"number\" value=\"170\"><\/div><div class=\"ps-2\"><span class=\"ps-label\" style=\"margin-top:0\">当前体重(kg)<\/span><input class=\"ps-input\" type=\"number\" value=\"65\"><\/div><\/div>\n  <span class=\"ps-label\">手机号<\/span><input class=\"ps-input\" type=\"tel\" value=\"138****6677\">\n  <button class=\"ps-save\" onclick=\"saveFormData('sheet-basic','基础数据已保存');closeSheet()\">保存<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-healthdata\">\n  <div class=\"ps-head\"><span class=\"ps-title\">健康数据<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <div class=\"ps-row\"><span>当前体重<\/span><span>65.0 kg<\/span><\/div>\n  <div class=\"ps-row\"><span>体脂率<\/span><span>24.5 %<\/span><\/div>\n  <div class=\"ps-row\"><span>BMI<\/span><span>22.5 正常<\/span><\/div>\n  <div class=\"ps-row\"><span>腰围 / 臀围<\/span><span>78 / 95 cm<\/span><\/div>\n  <div class=\"ps-row\"><span>腰臀比（自动）<\/span><span>0.82<\/span><\/div>\n  <div class=\"ps-note\">健康数据由打卡 / 设备同步自动更新，前往「打卡」录入最新数据<\/div>\n  <button class=\"ps-save\" onclick=\"closeSheet()\">知道了<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-history\">\n  <div class=\"ps-head\"><span class=\"ps-title\">健康史<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <span class=\"ps-label\">疾病史（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip sel\" onclick=\"toggleChip(this)\">2型糖尿病<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">高血压<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">血脂异常<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">脂肪肝<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">痛风<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">甲状腺<\/button><\/div>\n  <span class=\"ps-label\">过敏史（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip\" onclick=\"toggleChip(this)\">海鲜<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">花生<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">牛奶<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">鸡蛋<\/button><\/div>\n  <span class=\"ps-label\">用药史（可多条）<\/span>\n  <div id=\"med-list\"><div class=\"med-item\" style=\"background:#F9FAFB;border-radius:12px;padding:12px;margin-bottom:10px\"><div style=\"display:flex;gap:8px;align-items:center\"><input class=\"ps-input\" style=\"margin-bottom:0;flex:1\" placeholder=\"药品名称，如 二甲双胍\" type=\"text\"><button type=\"button\" onclick=\"this.closest('.med-item').remove()\" style=\"color:#F87171;font-size:16px;padding:0 6px\">✕<\/button><\/div><div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:8px\"><span style=\"font-size:12px;color:#6B7280\">是否长期用药<\/span><div style=\"display:flex;gap:6px\"><button class=\"ps-chip\" onclick=\"toggleChip(this,true)\">是<\/button><button class=\"ps-chip sel\" onclick=\"toggleChip(this,true)\">否<\/button><\/div><\/div><\/div><\/div>\n  <button type=\"button\" class=\"w-full py-2.5 rounded-xl border border-dashed border-gray-300 text-xs text-gray-500 font-medium\" onclick=\"addMed()\">+ 添加用药<\/button>\n  <div class=\"ps-note\">饮酒史 / 吸烟史为二期补充项<\/div>\n  <button class=\"ps-save\" onclick=\"saveFormData('sheet-history','健康史已保存');closeSheet()\">保存<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-special\">\n  <div class=\"ps-head\"><span class=\"ps-title\">特殊生理状态<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <span class=\"ps-label\">当前状态（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip\" onclick=\"toggleChip(this)\">怀孕<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">哺乳期<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">术后恢复<\/button><\/div>\n  <div class=\"ps-note\">特殊状态将影响热量、运动与营养建议（如孕期 / 哺乳期不建议激进减重）<\/div>\n  <button class=\"ps-save\" onclick=\"saveFormData('sheet-special','特殊状态已保存');closeSheet()\">保存<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-period\">\n  <div class=\"ps-head\"><span class=\"ps-title\">生理期<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <div class=\"flex gap-3\"><div class=\"ps-2\"><span class=\"ps-label\" style=\"margin-top:0\">周期天数<\/span><input class=\"ps-input\" type=\"number\" value=\"28\"><\/div><div class=\"ps-2\"><span class=\"ps-label\" style=\"margin-top:0\">月经天数<\/span><input class=\"ps-input\" type=\"number\" value=\"5\"><\/div><\/div>\n  <span class=\"ps-label\">最近一次月经开始<\/span><input class=\"ps-input\" type=\"date\" value=\"2026-05-20\">\n  <div class=\"flex items-center justify-between\" style=\"margin-top:14px\"><span class=\"text-sm font-medium text-gray-700\">今天月经来了？<\/span><div class=\"flex gap-2\"><button class=\"ps-chip sel\" onclick=\"toggleChip(this,true)\">否<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this,true)\">是<\/button><\/div><\/div>\n  <button class=\"ps-save\" onclick=\"saveFormData('sheet-period','生理期已记录');closeSheet()\">保存<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-diet\">\n  <div class=\"ps-head\"><span class=\"ps-title\">饮食偏好<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <span class=\"ps-label\">忌口（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip\" onclick=\"toggleChip(this)\">香菜<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">牛羊肉<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">辛辣<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">动物内脏<\/button><\/div>\n  <span class=\"ps-label\">过敏食物（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip\" onclick=\"toggleChip(this)\">海鲜<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">花生<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">坚果<\/button><\/div>\n  <div class=\"flex items-center justify-between\" style=\"margin-top:14px\"><span class=\"text-sm font-medium text-gray-700\">是否素食<\/span><div class=\"flex gap-2\"><button class=\"ps-chip sel\" onclick=\"toggleChip(this,true)\">否<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this,true)\">是<\/button><\/div><\/div>\n  <span class=\"ps-label\">口味偏好（多选）<\/span>\n  <div class=\"flex gap-2 flex-wrap\"><button class=\"ps-chip\" onclick=\"toggleChip(this)\">偏高油<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">偏高盐<\/button><button class=\"ps-chip\" onclick=\"toggleChip(this)\">偏甜<\/button><\/div>\n  <button class=\"ps-save\" onclick=\"saveFormData('sheet-diet','饮食偏好已保存');closeSheet()\">保存<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-device\">\n  <div class=\"ps-head\"><span class=\"ps-title\">智能设备<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <div class=\"flex items-center justify-between p-3 bg-gray-50 rounded-xl\" style=\"margin-top:8px\">\n    <div class=\"flex items-center gap-3\"><div class=\"w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center\"><iconify-icon icon=\"solar:scale-bold\" width=\"20\" class=\"text-emerald-600\"><\/iconify-icon><\/div><div><p class=\"text-xs font-bold text-gray-800\">YUNMAI S1 体脂秤<\/p><p class=\"text-[10px] text-emerald-500\">● 已连接<\/p><\/div><\/div>\n    <button class=\"ps-chip\" onclick=\"confirmUnbind()\">解绑<\/button>\n  <\/div>\n  <button class=\"w-full mt-3 py-3 rounded-2xl border-2 border-dashed text-xs font-medium text-gray-500 flex items-center justify-center gap-1\" style=\"border-color:#E5E7EB\" onclick=\"showToast('正在搜索附近蓝牙设备…')\"><iconify-icon icon=\"solar:add-circle-linear\" width=\"18\"><\/iconify-icon>添加新设备<\/button>\n  <button class=\"ps-save\" onclick=\"openSheet('measure')\">立即测量体重<\/button>\n<\/div>\n\n<div class=\"ps-sheet\" id=\"sheet-measure\">\n  <div class=\"ps-head\"><span class=\"ps-title\">体重测量<\/span><span class=\"ps-close\" onclick=\"closeSheet()\">✕<\/span><\/div>\n  <div id=\"measure-step1\" style=\"text-align:center;padding:10px 0\">\n    <iconify-icon icon=\"solar:scale-bold\" width=\"56\" class=\"text-emerald-400\"><\/iconify-icon>\n    <p class=\"text-sm font-bold text-gray-800 mt-2\">请光脚站在秤上<\/p>\n    <p class=\"text-[11px] text-gray-400 mt-1\">并确保体脂秤放在平整地面<\/p>\n    <button class=\"ps-save\" onclick=\"measureDone()\">开始测量<\/button>\n  <\/div>\n  <div id=\"measure-step2\" style=\"display:none;text-align:center;padding:10px 0\">\n    <div style=\"font-size:34px;font-weight:800;color:#065F46\">88.30 <span style=\"font-size:14px;font-weight:500\">kg<\/span><\/div>\n    <p class=\"text-[10px] text-gray-400 mt-1\">来源：YUNMAI S1 · 测量完成<\/p>\n    <div style=\"font-size:11px;color:#B45309;background:#FEF3C7;border-radius:10px;padding:8px 10px;margin-top:12px\">⚠️ 与上次相差较大，是否本人测量？<\/div>\n    <div class=\"flex gap-2 mt-2\"><button class=\"ps-chip sel\" style=\"flex:1\" onclick=\"closeSheet();showToast('已确认本次体重')\">是我的<\/button><button class=\"ps-chip\" style=\"flex:1\" onclick=\"closeSheet();showToast('已标记为无效')\">无效<\/button><\/div>\n  <\/div>\n<\/div>\n\n<script>\n    function openSheet(id){\n        if(id==='measure'){ var s1=document.getElementById('measure-step1'),s2=document.getElementById('measure-step2'); if(s1)s1.style.display='block'; if(s2)s2.style.display='none'; }\n        document.getElementById('ps-backdrop').classList.add('on');\n        var s=document.getElementById('sheet-'+id); if(s) s.classList.add('open');\n    }\n    function addMed(){\n        var box=document.getElementById('med-list'); if(!box) return;\n        var d=document.createElement('div'); d.className='med-item';\n        d.style.cssText='background:#F9FAFB;border-radius:12px;padding:12px;margin-bottom:10px';\n        d.innerHTML='<div style=\"display:flex;gap:8px;align-items:center\"><input class=\"ps-input\" style=\"margin-bottom:0;flex:1\" placeholder=\"药品名称，如 二甲双胍\" type=\"text\"><button type=\"button\" onclick=\"this.closest(\\'.med-item\\').remove()\" style=\"color:#F87171;font-size:16px;padding:0 6px\">✕<\/button><\/div><div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:8px\"><span style=\"font-size:12px;color:#6B7280\">是否长期用药<\/span><div style=\"display:flex;gap:6px\"><button class=\"ps-chip\" onclick=\"toggleChip(this,true)\">是<\/button><button class=\"ps-chip sel\" onclick=\"toggleChip(this,true)\">否<\/button><\/div><\/div>';\n        box.appendChild(d);\n    }\n    function closeSheet(){\n        document.getElementById('ps-backdrop').classList.remove('on');\n        document.querySelectorAll('.ps-sheet').forEach(function(s){s.classList.remove('open');});\n    }\n    function toggleChip(el, single){\n        if(single){ el.parentElement.querySelectorAll('.ps-chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); }\n        else { el.classList.toggle('sel'); }\n    }\n    function measureDone(){\n        document.getElementById('measure-step1').style.display='none';\n        document.getElementById('measure-step2').style.display='block';\n    }\n<\/script>\n\n<script>\n    // ========== Page Navigation ==========\n    function switchPage(pageId) {\n        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));\n        var target = document.getElementById(pageId);\n        if (target) target.classList.add('active');\n        document.querySelectorAll('.nav-item').forEach(function(item) {\n            var icon = item.querySelector('iconify-icon');\n            var iconName = icon.getAttribute('icon');\n            if (item.getAttribute('data-page') === pageId) {\n                item.classList.add('tab-active');\n                item.classList.remove('text-gray-400');\n                icon.setAttribute('icon', iconName.replace('linear', 'bold'));\n            } else {\n                item.classList.remove('tab-active');\n                item.classList.add('text-gray-400');\n                icon.setAttribute('icon', iconName.replace('bold', 'linear'));\n            }\n        });\n        if (pageId === 'page-tracking') setTimeout(initCharts, 100);\n    }\n\n    function switchSubTab(tabId) {\n        document.querySelectorAll('.sub-tab').forEach(function(t) {\n            t.classList.remove('border-emerald-500','text-emerald-500','font-bold');\n            t.classList.add('border-transparent','text-gray-400','font-medium');\n        });\n        var at = document.querySelector('.sub-tab[data-tab=\"' + tabId + '\"]');\n        at.classList.add('border-emerald-500','text-emerald-500','font-bold');\n        at.classList.remove('border-transparent','text-gray-400','font-medium');\n        document.querySelectorAll('.sub-page').forEach(function(p) { p.classList.add('hidden'); });\n        var sp = document.getElementById('sub-page-' + tabId);\n        if (sp) sp.classList.remove('hidden');\n        setTimeout(initCharts, 50);\n    }\n\n    function switchRecordTab(tabId) {\n        document.querySelectorAll('.record-tab').forEach(function(t) {\n            t.classList.remove('border-emerald-500','text-emerald-500','font-bold');\n            t.classList.add('border-transparent','text-gray-400','font-medium');\n        });\n        var rt = document.querySelector('.record-tab[data-tab=\"' + tabId + '\"]');\n        rt.classList.add('border-emerald-500','text-emerald-500','font-bold');\n        document.querySelectorAll('[id^=\"record-content-\"]').forEach(function(el) { el.classList.add('hidden'); });\n        var tgt = document.getElementById('record-content-' + tabId);\n        if (tgt) tgt.classList.remove('hidden');\n    }\n\n    // ========== Food Selector ==========\n    var currentFoodName='', currentCalPer100g=0, selectedGrams=100;\n    function showFoodSelector(name, calPer100g) {\n        currentFoodName = name; currentCalPer100g = calPer100g; selectedGrams = 100;\n        document.getElementById('selector-food-name').textContent = name;\n        document.getElementById('selector-total-cal').textContent = Math.round(calPer100g);\n        document.getElementById('selector-cal-detail').textContent = calPer100g + ' kcal × 100g';\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        var fp = document.querySelector('.preset-btn[data-grams=\"100\"]');\n        if (fp) { fp.classList.add('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200'); fp.classList.remove('bg-gray-50','text-gray-600','font-medium','border-gray-100'); }\n        document.getElementById('custom-grams').value = '';\n        document.getElementById('food-selector-overlay').classList.remove('hidden');\n    }\n    function hideFoodSelector() { document.getElementById('food-selector-overlay').classList.add('hidden'); }\n    function selectPreset(btn, grams) {\n        selectedGrams = grams;\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        btn.classList.add('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n        btn.classList.remove('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        document.getElementById('selector-total-cal').textContent = Math.round(currentCalPer100g * grams / 100);\n        document.getElementById('selector-cal-detail').textContent = currentCalPer100g + ' kcal × ' + grams + 'g';\n        document.getElementById('custom-grams').value = '';\n    }\n    function applyCustomGrams() {\n        var v = parseInt(document.getElementById('custom-grams').value);\n        if (!v || v <= 0) return;\n        selectedGrams = v;\n        document.querySelectorAll('.preset-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-50','text-emerald-600','font-bold','border-emerald-200');\n            b.classList.add('bg-gray-50','text-gray-600','font-medium','border-gray-100');\n        });\n        document.getElementById('selector-total-cal').textContent = Math.round(currentCalPer100g * v / 100);\n        document.getElementById('selector-cal-detail').textContent = currentCalPer100g + ' kcal × ' + v + 'g';\n    }\n    function confirmFoodAdd() { hideFoodSelector(); showToast('已添加到今日饮食记录'); }\n\n    // ========== Body Entry ==========\n    function switchBodyMetric(metric) {\n        document.querySelectorAll('.body-metric-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-500','text-white');\n            b.classList.add('bg-gray-100','text-gray-500');\n        });\n        document.querySelector('.body-metric-btn[data-metric=\"' + metric + '\"]').classList.add('bg-emerald-500','text-white');\n        document.querySelectorAll('.body-metric-content').forEach(function(c) { c.classList.add('hidden'); });\n        var t = document.getElementById('body-metric-' + metric);\n        if (t) t.classList.remove('hidden');\n    }\n    function showBodyEntry() { document.getElementById('body-entry-overlay').classList.remove('hidden'); }\n    function hideBodyEntry() { document.getElementById('body-entry-overlay').classList.add('hidden'); }\n    function toggleBodyUnit(btn, unit) {\n        var row = btn.closest('.body-unit-row');\n        row.querySelectorAll('.unit-btn').forEach(function(b) {\n            b.classList.remove('bg-emerald-500','text-white','border-emerald-200');\n            b.classList.add('bg-gray-100','text-gray-500','border-gray-100');\n        });\n        btn.classList.add('bg-emerald-500','text-white','border-emerald-200');\n        btn.classList.remove('bg-gray-100','text-gray-500','border-gray-100');\n    }\n    function saveBodyRecord() { hideBodyEntry(); showToast('记录成功！'); }\n\n    // ========== Toast ==========\n    function showToast(msg) {\n        var t = document.createElement('div');\n        t.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[200] bg-gray-900 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-lg';\n        t.textContent = msg;\n        document.body.appendChild(t);\n        setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 300ms'; setTimeout(function() { t.remove(); }, 300); }, 1500);\n    }\n\n    // ========== Charts ==========\n    var dietChart, bodyChart;\n    function initCharts() {\n        var dd = document.getElementById('diet-chart');\n        if (dd) {\n            if (dietChart) dietChart.dispose();\n            dietChart = echarts.init(dd);\n            dietChart.setOption({\n                tooltip: { trigger: 'item' },\n                series: [{\n                    name: '热量分配', type: 'pie', radius: ['60%', '85%'],\n                    avoidLabelOverlap: false, label: { show: false },\n                    data: [\n                        { value: 342, name: '早餐', itemStyle: { color: '#FDBA74' } },\n                        { value: 580, name: '午餐', itemStyle: { color: '#60A5FA' } },\n                        { value: 323, name: '晚餐', itemStyle: { color: '#A78BFA' } },\n                        { value: 282, name: '剩余', itemStyle: { color: '#F3F4F6' } }\n                    ]\n                }]\n            });\n        }\n        var bd = document.getElementById('body-chart');\n        if (bd) {\n            if (bodyChart) bodyChart.dispose();\n            bodyChart = echarts.init(bd);\n            bodyChart.setOption({\n                grid: { left: '10%', right: '5%', top: '10%', bottom: '20%' },\n                xAxis: { type: 'category', data: ['05-13','05-14','05-15','05-16','05-17','05-18','05-19'], axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 10, color: '#9CA3AF' } },\n                yAxis: { type: 'value', min: 64, splitLine: { lineStyle: { type: 'dashed', color: '#F3F4F6' } }, axisLabel: { fontSize: 10, color: '#9CA3AF' } },\n                series: [{ data: [68.5,67.8,67.2,66.5,66.0,65.5,65.2], type: 'line', smooth: true, symbol: 'circle', symbolSize: 6, itemStyle: { color: '#10B981' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{ offset: 0, color: 'rgba(16,185,129,0.2)' },{ offset: 1, color: 'rgba(16,185,129,0)' }]) } }]\n            });\n        }\n    }\n\n    // ========== ONBOARDING ==========\n    var onbCurStep = 1;\n    var ONB_TOTAL = 4;\n    var onbGender = '';\n    var customDiseases = [];\n    var customAllergies = [];\n    var customPhysios = [];\n    var needWeightLoss = true;\n\n    function selectGender(el, gender) {\n        document.querySelectorAll('.gender-card').forEach(function(c) { c.classList.remove('sel'); });\n        el.classList.add('sel');\n        onbGender = gender;\n    }\n\n    function updateRuler(id, val) {\n        var el = document.getElementById(id);\n        if (!el) return;\n        if (id === 'onb-weight' || id === 'onb-target-wt')\n            el.textContent = parseFloat(val).toFixed(1);\n        else\n            el.textContent = parseInt(val);\n    }\n\n    function fineRuler(inpId, dispId, delta) {\n        var inp = document.getElementById(inpId);\n        var isW = (dispId === 'onb-weight' || dispId === 'onb-target-wt');\n        var step = isW ? 0.5 : 1;\n        var v = parseFloat(inp.value) + delta;\n        v = Math.round(v / step) * step;\n        v = Math.max(parseFloat(inp.min), Math.min(parseFloat(inp.max), v));\n        inp.value = v;\n        var dispVal = isW ? v.toFixed(1) : parseInt(v);\n        document.getElementById(dispId).textContent = dispVal;\n        if (dispId === 'onb-weight') { updateBMI(); updatePlanCalc(); }\n        if (dispId === 'onb-target-wt') { updateTargetBMI(); updatePlanCalc(); }\n    }\n\n    function updateBMI() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var w = parseFloat(document.getElementById('onb-weight-inp').value);\n        if (!h || !w) return;\n        var bmi = w / (h * h);\n        var bmiR = bmi.toFixed(1);\n        document.getElementById('onb-bmi').textContent = bmiR;\n        var label = '正常', left = 50;\n        if (bmi < 18.5) { label = '偏瘦'; left = 12; }\n        else if (bmi < 24) { label = '正常'; left = 38; }\n        else if (bmi < 28) { label = '超重'; left = 68; }\n        else { label = '肥胖'; left = 88; }\n        document.getElementById('onb-bmi-label').textContent = label;\n        var p2 = document.getElementById('bmi-pos2');\n        if (p2) p2.style.left = left + '%';\n        updatePlanCalc();\n    }\n\n    function updateTargetBMI() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var tw = parseFloat(document.getElementById('onb-target-inp').value);\n        if (!h || !tw) return;\n        var bmi = tw / (h * h);\n        var bmiR = bmi.toFixed(1);\n        document.getElementById('target-bmi').textContent = bmiR;\n        var label = '正常', left = 50;\n        if (bmi < 18.5) { label = '偏瘦'; left = 12; document.getElementById('target-bmi-warn').style.display = 'block'; }\n        else if (bmi < 24) { label = '正常'; left = 38; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        else if (bmi < 28) { label = '超重'; left = 68; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        else { label = '肥胖'; left = 88; document.getElementById('target-bmi-warn').style.display = 'none'; }\n        document.getElementById('target-bmi-label').textContent = label;\n        var pos = document.getElementById('target-bmi-pos');\n        if (pos) pos.style.left = left + '%';\n    }\n\n    function setupTargetSlider() {\n        var cw = parseFloat(document.getElementById('onb-weight-inp').value);\n        var inp = document.getElementById('onb-target-inp');\n        inp.max = cw - 0.1;\n        if (parseFloat(inp.value) >= cw) inp.value = cw - 0.5;\n        inp.min = 35;\n        updateRuler('onb-target-wt', inp.value);\n        updateTargetBMI();\n        updatePlanCalc();\n        var ticks = document.getElementById('target-ticks');\n        if (ticks) {\n            var r = Math.floor(cw - 0.1);\n            ticks.innerHTML = '<span>35<\/span><span>' + Math.round(35 + (r - 35) / 3) + '<\/span><span>' + Math.round(35 + 2 * (r - 35) / 3) + '<\/span><span>' + r + '<\/span>';\n        }\n    }\n\n    function updatePlanCalc() {\n        var cw = parseFloat(document.getElementById('onb-weight-inp').value);\n        var tw = parseFloat(document.getElementById('onb-target-inp').value);\n        var h = parseFloat(document.getElementById('onb-height-inp').value);\n        if (!cw || !tw || !h) return;\n        var diff = cw - tw;\n        var ws = diff > 0 ? Math.max(4, Math.round(Math.abs(diff) / 0.5)) : 0;\n        var wkly = ws > 0 ? (diff / ws) : 0;\n\n        // 身高、体重\n        var ph = document.getElementById('plan-height');\n        if (ph) ph.textContent = h;\n        var pwEl = document.getElementById('plan-weight');\n        if (pwEl) pwEl.textContent = cw;\n\n        // BMI分类和进度条\n        var bmi = cw / ((h / 100) * (h / 100));\n        var bmiR = bmi.toFixed(1);\n        var bmiEl = document.getElementById('plan-bmi');\n        if (bmiEl) bmiEl.textContent = bmiR;\n\n        var catEl = document.getElementById('plan-bmi-cat');\n        var dotEl = document.getElementById('plan-bmi-dot');\n        var catName, leftPct, dotColor;\n        if (bmi < 18.5) { catName = '偏瘦'; leftPct = 8; dotColor = '#F59E0B'; }\n        else if (bmi < 24) { catName = '理想'; leftPct = 38; dotColor = '#10B981'; }\n        else if (bmi < 28) { catName = '偏胖'; leftPct = 65; dotColor = '#F59E0B'; }\n        else { catName = '肥胖'; leftPct = 92; dotColor = '#EF4444'; }\n        if (catEl) catEl.textContent = catName;\n        if (dotEl) { dotEl.style.left = leftPct + '%'; dotEl.style.borderColor = dotColor; }\n\n        // 目标体重、周期\n        var pt = document.getElementById('plan-target');\n        if (pt) pt.innerHTML = tw + '<span style=\"font-size:14px\">kg<\/span>';\n        var pw = document.getElementById('plan-weeks');\n        if (pw) pw.innerHTML = ws + '<span style=\"font-size:14px\">周<\/span>';\n        var pwk = document.getElementById('plan-weekly');\n        if (pwk) pwk.innerHTML = Math.abs(wkly).toFixed(1) + '<span style=\"font-size:14px\">kg/周<\/span>';\n\n        // 热量\n        var cd = diff > 0 ? Math.min(Math.round(Math.abs(wkly) * 700), 800) : 0;\n        var ct = Math.max(1200, 2000 - cd);\n        var ce = document.getElementById('plan-cal');\n        if (ce) ce.textContent = ct;\n        var de = document.getElementById('plan-deficit');\n        if (de) de.textContent = cd;\n\n        // 饮食建议\n        var dietEl = document.getElementById('plan-diet-tip');\n        if (dietEl) {\n            if (bmi >= 28) {\n                dietEl.textContent = '建议严格控制总热量摄入，减少高油高糖食物，增加蔬菜比例，优先选择低GI主食，每日蛋白质摄入不低于60g。';\n            } else if (bmi >= 24) {\n                dietEl.textContent = '建议控制精制碳水摄入，增加优质蛋白（鸡胸肉、鱼虾、豆制品）和膳食纤维（蔬菜、全谷物），每日热量控制在目标范围内。';\n            } else if (bmi >= 18.5) {\n                dietEl.textContent = '建议保持均衡饮食，适当增加优质蛋白摄入，控制精制糖和油炸食品，多吃蔬果和全谷物。';\n            } else {\n                dietEl.textContent = '建议适当增加营养摄入，保证每日三餐规律，优先选择高蛋白食物（蛋、奶、瘦肉），可适当加餐补充能量。';\n            }\n        }\n\n        // 运动建议\n        var exEl = document.getElementById('plan-exercise-tip');\n        if (exEl) {\n            if (bmi >= 28) {\n                exEl.textContent = '建议从低强度运动开始（如快走、游泳、骑行），每周 4-5 次，每次 30-40 分钟，避免跳绳、跑步等高冲击运动保护关节。';\n            } else if (bmi >= 24) {\n                exEl.textContent = '建议每周进行 3-5 次中等强度有氧运动（慢跑、游泳、动感单车等）结合 2-3 次力量训练，每次 40-50 分钟效果更佳。';\n            } else if (bmi >= 18.5) {\n                exEl.textContent = '建议每周 3-4 次有氧运动（慢跑、快走、游泳等）结合 2 次力量训练，保持运动多样性，每次 30-45 分钟。';\n            } else {\n                exEl.textContent = '建议以力量训练为主（自重训练、瑜伽、普拉提等）帮助增肌，配合适量有氧运动（慢跑、快走），每周 3-4 次。';\n            }\n        }\n    }\n\n    function refreshBmiAssessment() {\n        var h = parseFloat(document.getElementById('onb-height-inp').value) / 100;\n        var w = parseFloat(document.getElementById('onb-weight-inp').value);\n        var bmi = w / (h * h);\n        var bmiR = bmi.toFixed(1);\n        var lowW = (18.5 * h * h).toFixed(1);\n        var highW = (24 * h * h).toFixed(1);\n        document.getElementById('bmi-result-num').textContent = bmiR;\n        document.getElementById('bmi-range-low').textContent = lowW;\n        document.getElementById('bmi-range-high').textContent = highW;\n        var badge = document.getElementById('bmi-result-badge');\n        var title = document.getElementById('bmi-result-title');\n        var sub = document.getElementById('bmi-result-sub');\n        var normalBox = document.getElementById('bmi-normal-box');\n        var suggestion = document.getElementById('bmi-suggestion-text');\n        var choiceBtns = document.getElementById('bmi-choice-btns');\n        if (bmi >= 24) {\n            badge.textContent = bmi >= 28 ? '肥胖' : '超重';\n            badge.style.background = '#FEF2F2'; badge.style.color = '#DC2626';\n            title.textContent = 'BMI 偏高';\n            sub.textContent = '您的体重超出健康范围，建议设定减重目标';\n            normalBox.style.display = 'none';\n            suggestion.textContent = '';\n            choiceBtns.style.display = 'none';\n            needWeightLoss = true;\n        } else if (bmi >= 18.5) {\n            badge.textContent = '正常';\n            badge.style.background = '#ECFDF5'; badge.style.color = '#059669';\n            title.textContent = 'BMI 正常';\n            sub.textContent = '您的体重处于健康范围';\n            normalBox.style.display = 'block';\n            suggestion.textContent = '您是否有减重需求？';\n            choiceBtns.style.display = 'flex';\n            needWeightLoss = false;\n        } else {\n            badge.textContent = '偏瘦';\n            badge.style.background = '#FEF3C7'; badge.style.color = '#D97706';\n            title.textContent = 'BMI 偏瘦';\n            sub.textContent = '您的体重偏低，建议适当增加营养';\n            normalBox.style.display = 'none';\n            suggestion.textContent = '';\n            choiceBtns.style.display = 'none';\n            needWeightLoss = false;\n        }\n    }\n\n    function acceptWeightLoss() {\n        needWeightLoss = true;\n        document.getElementById('onb-prev-btn').style.display = '';\n        document.getElementById('onb-next-btn').style.display = '';\n        showOnbStep(6);\n    }\n\n    function declineWeightLoss() {\n        needWeightLoss = false;\n        finishOnboarding();\n    }\n\n    // ========== Date Scrollers ==========\n    var dateYear, dateMonth, dateDay;\n    function initDateScrollers() {\n        var curY = 1998, curM = 6, curD = 15;\n        dateYear = curY; dateMonth = curM; dateDay = curD;\n\n        function buildCol(colEl, start, end, selected) {\n            var inner = colEl.querySelector('.scroller-col-inner');\n            inner.innerHTML = '';\n            for (var i = start; i <= end; i++) {\n                var div = document.createElement('div');\n                div.className = 'scroller-it';\n                div.textContent = i;\n                if (i === selected) div.classList.add('hi');\n                div.addEventListener('click', function() {\n                    colEl.querySelectorAll('.scroller-it').forEach(function(d) { d.classList.remove('hi'); });\n                    this.classList.add('hi');\n                    this.scrollIntoView({ block: 'center', behavior: 'smooth' });\n                    updateAge();\n                });\n                inner.appendChild(div);\n            }\n            requestAnimationFrame(function() {\n                var sel = inner.querySelector('.scroller-it.hi');\n                if (sel) sel.scrollIntoView({ block: 'center' });\n            });\n        }\n\n        buildCol(document.getElementById('sc-year'), 1940, 2010, curY);\n        buildCol(document.getElementById('sc-month'), 1, 12, curM);\n        buildCol(document.getElementById('sc-day'), 1, 31, curD);\n\n        document.querySelectorAll('.scroller-col').forEach(function(col) {\n            col.addEventListener('scroll', function() {\n                var items = col.querySelectorAll('.scroller-it');\n                var colRect = col.getBoundingClientRect();\n                var centerY = colRect.top + colRect.height / 2;\n                var closest = null, minDist = Infinity;\n                items.forEach(function(it) {\n                    var r = it.getBoundingClientRect();\n                    var dist = Math.abs(r.top + r.height / 2 - centerY);\n                    if (dist < minDist) { minDist = dist; closest = it; }\n                });\n                if (closest) {\n                    var changed = false;\n                    items.forEach(function(it) {\n                        if (it === closest && !it.classList.contains('hi')) { it.classList.add('hi'); changed = true; }\n                        else if (it !== closest && it.classList.contains('hi')) { it.classList.remove('hi'); }\n                    });\n                    if (changed) updateAge();\n                }\n            });\n        });\n    }\n\n    function getSelectedDate() {\n        var yEl = document.querySelector('#sc-year .scroller-it.hi');\n        var mEl = document.querySelector('#sc-month .scroller-it.hi');\n        var dEl = document.querySelector('#sc-day .scroller-it.hi');\n        if (!yEl || !mEl || !dEl) return null;\n        return { year: parseInt(yEl.textContent), month: parseInt(mEl.textContent), day: parseInt(dEl.textContent) };\n    }\n\n    function updateAge() {\n        var d = getSelectedDate();\n        if (!d) return;\n        var now = new Date();\n        var age = now.getFullYear() - d.year;\n        if (now.getMonth() + 1 < d.month || (now.getMonth() + 1 === d.month && now.getDate() < d.day)) age--;\n        document.getElementById('onb-age').textContent = age;\n    }\n\n    // ========== Step Navigation ==========\n    function showOnbStep(n) {\n        document.querySelectorAll('#onb-body .onb-step').forEach(function(s) {\n            s.classList.remove('active');\n            if (parseInt(s.dataset.step) < n) s.style.transform = 'translateX(-50px)';\n            else if (parseInt(s.dataset.step) > n) s.style.transform = 'translateX(50px)';\n        });\n        var cur = document.querySelector('#onb-body .onb-step[data-step=\"' + n + '\"]');\n        if (cur) { cur.classList.add('active'); cur.style.transform = 'translateX(0)'; }\n        onbCurStep = n;\n\n        document.querySelectorAll('#step-dots .step-dot').forEach(function(d, i) {\n            d.classList.remove('current', 'done');\n            if (i + 1 === n) d.classList.add('current');\n            else if (i + 1 < n) d.classList.add('done');\n        });\n\n        var prevBtn = document.getElementById('onb-prev-btn');\n        var nextBtn = document.getElementById('onb-next-btn');\n        prevBtn.classList.toggle('invisible', n === 1);\n        if (n === ONB_TOTAL) {\n            nextBtn.textContent = '查看报告';\n            nextBtn.classList.add('mint-gradient');\n        } else {\n            nextBtn.textContent = '下一步';\n            nextBtn.classList.remove('mint-gradient');\n        }\n\n        // Step-specific init\n        if (n === 1) setTimeout(initDateScrollers, 100);\n        if (n === 2) { updateBMI(); }\n        if (n === 4) updatePlanCalc();\n    }\n\n    function nextOnbStep() {\n        if (onbCurStep === 1 && !onbGender) { showToast('请选择性别'); return; }\n        if (onbCurStep < ONB_TOTAL) showOnbStep(onbCurStep + 1);\n        else finishOnboarding();\n    }\n\n    function prevOnbStep() {\n        if (onbCurStep > 1) showOnbStep(onbCurStep - 1);\n    }\n\n    // ========== Toggle Switches ==========\n    var physioCustom = [];\n    function toggleSwitch(type) {\n        var tog = document.getElementById('toggle-' + type);\n        var exp = document.getElementById('expand-' + type);\n        var isOff = tog.classList.contains('off');\n        if (isOff) {\n            tog.classList.remove('off');\n            tog.classList.add('on');\n            exp.style.maxHeight = exp.scrollHeight + 'px';\n            exp.style.opacity = '1';\n            exp.style.marginTop = '12px';\n        } else {\n            tog.classList.remove('on');\n            tog.classList.add('off');\n            exp.style.maxHeight = '0px';\n            exp.style.opacity = '0';\n            exp.style.marginTop = '0px';\n        }\n    }\n\n    function selectSolo(el, group) {\n        document.querySelectorAll('#' + group + '-tags .tag-item').forEach(function(t) {\n            if (t.style.borderStyle !== 'dashed') t.classList.remove('sel');\n        });\n        el.classList.add('sel');\n    }\n\n    function reEditProfile() {\n        showOnbStep(1);\n        showToast('💡 请重新调整数据，方案将实时更新');\n    }\n\n    function finishOnboarding() {\n        document.getElementById('onboarding').classList.add('hidden');\n        if(document.getElementById('page-home')){switchPage('page-home')};\n        updateBMI();\n        updatePlanCalc();\n        showToast('方案已生成，开始您的健康之旅吧！');\n    }\n\n    // ========== Disease & Allergy Sheets ==========\n    function openDiseaseSheet() {\n        document.getElementById('disease-backdrop').classList.add('on');\n        document.getElementById('disease-sheet').classList.add('open');\n        document.getElementById('disease-sheet-input').value = '';\n        document.getElementById('disease-sheet-input').placeholder = '请输入疾病名称';\n        renderDiseaseChips();\n    }\n\n    function closeDiseaseSheet() {\n        document.getElementById('disease-backdrop').classList.remove('on');\n        document.getElementById('disease-sheet').classList.remove('open');\n    }\n\n    function confirmCustomDisease() {\n        var inp = document.getElementById('disease-sheet-input');\n        var name = inp.value.trim();\n        if (!name) { showToast('请输入名称'); return; }\n        if (inp.placeholder.indexOf('过敏') >= 0) {\n            if (customAllergies.indexOf(name) >= 0) { showToast('该过敏食物已添加'); return; }\n            customAllergies.push(name);\n            inp.value = '';\n            renderAllergyChips();\n        } else {\n            if (customDiseases.indexOf(name) >= 0) { showToast('该疾病已添加'); return; }\n            customDiseases.push(name);\n            inp.value = '';\n            renderDiseaseChips();\n            renderStep6DiseaseChips();\n        }\n    }\n\n    function renderDiseaseChips() {\n        var sc = document.getElementById('custom-disease-chips-sheet');\n        if (sc) sc.innerHTML = customDiseases.map(function(d, i) {\n            return '<span class=\"custom-disease-chip\">' + d + '<span class=\"remove-chip\" onclick=\"removeCustomDisease(' + i + ')\">x<\/span><\/span>';\n        }).join('');\n    }\n\n    function renderStep6DiseaseChips() {\n        var dp = document.getElementById('custom-disease-chips-display');\n        if (dp) dp.innerHTML = customDiseases.map(function(d, i) {\n            return '<span class=\"custom-disease-chip\">' + d + '<span class=\"remove-chip\" onclick=\"removeCustomDisease(' + i + ')\">x<\/span><\/span>';\n        }).join('');\n    }\n\n    function removeCustomDisease(idx) {\n        customDiseases.splice(idx, 1);\n        renderDiseaseChips();\n        renderStep6DiseaseChips();\n    }\n\n    function toggleDrugSwitch(track) {\n        track.classList.toggle('on');\n        var box = document.getElementById('drug-input-box');\n        if (box) box.classList.toggle('show', track.classList.contains('on'));\n    }\n\n    function toggleAllergySwitch(track) {\n        track.classList.toggle('on');\n        document.getElementById('allergy-box').style.display = track.classList.contains('on') ? 'block' : 'none';\n    }\n\n    function openAllergySheet() {\n        document.getElementById('disease-backdrop').classList.add('on');\n        document.getElementById('disease-sheet').classList.add('open');\n        document.getElementById('disease-sheet-input').value = '';\n        document.getElementById('disease-sheet-input').placeholder = '请输入过敏食物名称';\n        renderAllergyChips();\n    }\n\n    function renderAllergyChips() {\n        var sc = document.getElementById('custom-allergy-chips');\n        if (sc) sc.innerHTML = customAllergies.map(function(d, i) {\n            return '<span class=\"custom-disease-chip\">' + d + '<span class=\"remove-chip\" onclick=\"removeCustomAllergy(' + i + ')\">x<\/span><\/span>';\n        }).join('');\n    }\n\n    function removeCustomAllergy(idx) {\n        customAllergies.splice(idx, 1);\n        renderAllergyChips();\n    }\n\n    // ========== Init ==========\n    showOnbStep(1);\n    switchPage('page-profile');\n\n// ========== OPTIMIZED FIXES ==========\n// 1. Confirm dialog (replaces showToast for destructive actions)\nfunction confirmAction(msg, onYes, onNo) {\n    if (confirm(msg)) { if (onYes) onYes(); }\n    else { if (onNo) onNo(); }\n}\n\n// 2. Real save: read form & store to localStorage\nfunction saveFormData(sectionId, toastMsg) {\n    var data = {};\n    var el = document.getElementById(sectionId);\n    if (!el) { showToast(toastMsg); return; }\n    var inputs = el.querySelectorAll('input, select, textarea');\n    var hasValue = false;\n    inputs.forEach(function(inp) {\n        if (inp.type === 'checkbox') { data[inp.name || inp.id] = inp.checked; }\n        else if (inp.type === 'radio') { if (inp.checked) data[inp.name || inp.id] = inp.value; }\n        else { data[inp.name || inp.id] = inp.value; if (inp.value.trim()) hasValue = true; }\n    });\n    // Also read selected chips\n    el.querySelectorAll('.tag-item.sel').forEach(function(t) {\n        data['chip_' + (t.getAttribute('data-key') || t.textContent.trim())] = true;\n    });\n    try { localStorage.setItem('health_app_' + sectionId, JSON.stringify(data)); } catch(e) {}\n    showToast(toastMsg + (hasValue ? ' ✅' : ' ⚠️ 未检测到输入内容'));\n}\n\n// 3. Cross-page nav fix: each file now has placeholder pages for all tabs\nfunction switchPageFixed(id) {\n    // If page doesn't exist in this file, show a placeholder\n    var page = document.getElementById('page-' + id);\n    if (!page) {\n        showToast('📱 此功能在「' + (id==='page-home'?'首页':id==='page-tracking'?'数据':id==='page-diet-record'?'饮食记录':id==='page-messages'?'消息':'我的') + '」页面中，请打开对应文件查看');\n        return;\n    }\n    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });\n    page.classList.add('active');\n    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('tab-active'); });\n    var nav = document.querySelector('.nav-item[data-page=\"' + id + '\"]');\n    if (nav) nav.classList.add('tab-active');\n    if (typeof switchPage === 'function') switchPage(id); // also call original\n}\n\n// 4. Empty state display\nfunction showEmptyState(containerId, msg) {\n    var el = document.getElementById(containerId);\n    if (!el || el.children.length > 0) return;\n    el.innerHTML = '<div style=\"text-align:center;padding:40px 20px;color:#9CA3AF;\"><iconify-icon icon=\"solar:file-text-linear\" width=\"40\"><\/iconify-icon><p style=\"font-size:13px;margin-top:12px;\">' + msg + '<\/p><\/div>';\n}\n\n// 5. Fix: switchPage in bottom nav points to switchPageFixed\n(function() {\n    setTimeout(function() {\n        document.querySelectorAll('.nav-item[data-page]').forEach(function(n) {\n            var orig = n.getAttribute('onclick');\n            if (orig && orig.indexOf('switchPageFixed') === -1) {\n                n.setAttribute('onclick', orig.replace('switchPage(', 'switchPageFixed('));\n            }\n        });\n    }, 100);\n})();\n\n// 6. Fix: Logout with confirmation\nfunction confirmLogout() {\n    confirmAction('确定要退出登录吗？', function() {\n        showToast('已退出登录');\n        setTimeout(function() { location.reload(); }, 800);\n    });\n}\n\n// 7. Fix: Device unbind with confirmation\nfunction confirmUnbind() {\n    confirmAction('确定要解绑设备吗？解绑后需重新配对。', function() {\n        showToast('设备已解绑');\n    });\n}\n<\/script>\n<\/script>\n<\/div>\n<script>(function(){var MAP={'page-tracking':'data','page-messages':'msg','page-profile':'me'};function P(){return (window.parent&&window.parent!==window)?window.parent:null;}function bind(){document.querySelectorAll('.nav-item[data-page]').forEach(function(b){var dp=b.getAttribute('data-page');b.setAttribute('onclick','');if(dp==='page-home'){b.onclick=function(e){if(e&&e.preventDefault)e.preventDefault();var p=P();if(p&&p.appHome)p.appHome();};}else if(MAP[dp]){b.onclick=function(e){if(e&&e.preventDefault)e.preventDefault();var p=P();if(p&&p.appGo)p.appGo(MAP[dp]);};}});document.querySelectorAll('.fab-button').forEach(function(f){f.setAttribute('onclick','');f.onclick=function(){var p=P();if(p&&p.appGo)p.appGo('diet');};});}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(bind,220);});else setTimeout(bind,220);})();<\/script>\n<\/body>\n<\/html>\n"
};
var FID={onb:"f-onb",home:"f-home",home2:"f-home2",data:"f-data",diet:"f-diet",msg:"f-msg",me:"f-me"};

function appGo(tab){if(!FID[tab])return;ensure(tab);Object.keys(FID).forEach(function(k){var el=document.getElementById(FID[k]);if(el)el.classList.toggle("show",k===tab);});}
function appHome(){appGo(HOME);}
